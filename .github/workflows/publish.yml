name: Publish to PyPI

# Trusted publishing on PyPI is not configured for this repo, so the
# release-triggered workflow was failing on every tag. Until OIDC is set up,
# this workflow runs only on manual dispatch and uses an API token from
# repository secrets (PYPI_API_TOKEN). Manual twine upload remains the
# documented path; this workflow is here for when the secret is added.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "PYPI_API_TOKEN secret not set. See README for manual publish steps."
            exit 1
          fi
          twine upload --skip-existing dist/*
