    max_tokens: 200

- id: "compute-t2-019"
  tier: 2
  type: procedural
  hops: 2
  question: >
    How do you configure AWS Batch to process a large job array using Spot
    compute environments with automatic retry?
  ground_truth:
    answer: >
      Steps: 1. Create a Managed Compute Environment with SPOT type: specify instance types
      (OPTIMAL or specific families), bid percentage (100 = pay up to On-Demand price), and
      a service-linked role for Spot (AWSBatchServiceRole). Set min/max/desired vCPUs.
      2. Create a Job Queue and assign the Spot Compute Environment (with priority). Optionally
      add an On-Demand environment at lower priority as fallback. 3. Create a Job Definition:
      Docker image, vCPU/memory requirements, and retry strategy — set attempts to 3 and add
      evaluateOnExit conditions (e.g., retry on EXIT_CODE:1 or REASON:Host EC2 was terminated).
      4. Submit the job as an array: aws batch submit-job --array-properties size=1000
      creates 1,000 child jobs. Each child gets an AWS_BATCH_JOB_ARRAY_INDEX env var.
      5. Spot interruptions trigger retries automatically via the retry strategy. Use checkpointing
      in your job code to resume from the last checkpoint rather than reprocessing fully.
    source_refs:
      - "batch/latest/userguide/spot_fleet_IAM_role.html"
      - "batch/latest/userguide/job_retries.html"
    required_entities:
      - "AWS Batch"
      - "job array"
      - "Spot compute environment"
      - "retry strategy"
  constraints:
    must_mention:
      - "job array"
      - "retry strategy"
    must_not_claim:
      - "Batch does not support Spot"
      - "no retry on interruption"
    max_tokens: 200

- id: "compute-t2-020"
  tier: 2
  type: procedural
  hops: 2
  question: >
    How do you configure CloudWatch alarms and Auto Scaling to scale an ECS
    service based on SQS queue depth?
  ground_truth:
    answer: >
      Steps: 1. Register the ECS service as an Application Auto Scaling scalable target:
      service-namespace ecs, resource-id service/{cluster}/{service-name}, scalable-dimension
      ecs:service:DesiredCount. 2. Create a CloudWatch alarm on the SQS metric
      ApproximateNumberOfMessagesVisible (the queue depth metric). Set threshold for scale-out
      (e.g., > 100 messages) and scale-in (< 10 messages). 3. Create Step Scaling Policies or
      Target Tracking policy on the ECS scalable target. For SQS-based scaling, Target Tracking
      with a custom metric works well: define a custom CloudWatch metric
      BacklogPerInstance = SQS queue depth / ECS task count. Target this to your desired
      messages-per-task value. 4. Publish the custom metric via Lambda on a schedule using
      CloudWatch PutMetricData API. 5. This pattern scales ECS tasks proportionally to queue
      depth, keeping per-task processing load constant regardless of queue size.
    source_refs:
      - "autoscaling/application/userguide/services-that-can-integrate-ecs.html"
    required_entities:
      - "Application Auto Scaling"
      - "SQS"
      - "ECS"
      - "ApproximateNumberOfMessagesVisible"
  constraints:
    must_mention:
      - "ApproximateNumberOfMessagesVisible"
      - "scalable target"
    must_not_claim:
      - "ECS cannot scale on SQS metrics"
      - "only CPU-based scaling available"
    max_tokens: 200
