- id: "net-t4-001"
  tier: 4
  type: relational
  hops: 3
  question: >
    Trace the full network path of a request from an internet user to a private EC2
    instance behind an ALB in a VPC, including all routing and firewall checkpoints.
  ground_truth:
    answer: >
      Full request path: 1. DNS resolution — user's browser resolves the domain via Route 53
      or public DNS, returning the ALB's DNS name (resolved to an ALB IP in a public subnet).
      2. Internet → Internet Gateway — packet arrives at the IGW attached to the VPC. The
      IGW translates the destination public IP to the ALB's private IP (NAT). 3. Route table
      evaluation — the public subnet route table routes 0.0.0.0/0 to IGW (inbound path, the
      IGW sends to ALB's private IP). 4. NACL (subnet-level) — inbound NACL on the public
      subnet checks the packet; must allow inbound on port 443. ALB lives in a public subnet.
      5. ALB security group — inbound rule must allow port 443 from 0.0.0.0/0. 6. ALB
      terminates TLS, evaluates listener rules, selects target group, picks a healthy EC2.
      7. ALB-to-EC2 — ALB sends traffic to the EC2 private IP in a private subnet. NACL on
      private subnet checks (must allow inbound from ALB subnet range). EC2 security group
      checks inbound rule (must allow from ALB security group or ALB subnet CIDR). 8. EC2
      processes request; response takes the reverse path through the same checkpoints.
    source_refs:
      - "vpc/latest/userguide/VPC_Internet_Gateway.html"
      - "vpc/latest/userguide/vpc-network-acls.html"
      - "elasticloadbalancing/latest/application/introduction.html"
    required_entities:
      - "Internet Gateway"
      - "ALB"
      - "NACL"
      - "Security Group"
      - "route table"
  constraints:
    must_mention:
      - "Internet Gateway"
      - "NACL"
      - "security group"
    must_not_claim:
      - "EC2 directly reachable from internet"
      - "NACLs not in the path"
    max_tokens: 300

- id: "net-t4-002"
  tier: 4
  type: relational
  hops: 3
  question: >
    How does Transit Gateway route table segmentation enforce network isolation between
    production, development, and shared-services VPCs in a multi-account AWS environment?
  ground_truth:
    answer: >
      TGW route table segmentation: Each TGW attachment (VPC) is associated with one TGW
      route table for routing decisions and can propagate routes to one or more route tables.
      Three-segment design:
      Production route table: prod VPCs propagate to it; shared-services VPC propagates to it.
      Association: prod VPC attachments. Prod VPCs can reach shared-services but not dev.
      Dev route table: dev VPCs propagate to it; shared-services propagates to it. Dev VPCs
      can reach shared-services but not prod.
      Shared-services route table: propagates from shared-services VPC only; shared-services
      can initiate to prod and dev (if needed) or just receive (spoke model). Static routes
      can be added to allow or block specific cross-segment traffic. This prevents prod ↔ dev
      lateral movement while allowing both to reach centralized services (DNS, logging,
      patching). No security group or NACL changes needed — enforced at the TGW routing layer.
    source_refs:
      - "vpc/latest/tgw/tgw-route-tables.html"
    required_entities:
      - "Transit Gateway"
      - "TGW route table"
      - "VPC attachment"
      - "shared services VPC"
  constraints:
    must_mention:
      - "route table"
      - "propagation"
    must_not_claim:
      - "TGW allows all-to-all by default"
      - "security groups enforce TGW segmentation"
    max_tokens: 300

- id: "net-t4-003"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do Route 53 private hosted zones, VPC DNS resolver, and EC2 instance hostname
    resolution interact when an EC2 instance in VPC-A resolves a service in VPC-B?
  ground_truth:
    answer: >
      Cross-VPC private hosted zone resolution requires PHZ association with both VPCs.
      Setup: a private hosted zone (service.internal) is associated with both VPC-A and
      VPC-B. Resolution path: 1. EC2 in VPC-A queries service.db.internal. 2. EC2's DNS
      search domain (set by DHCP options) appends the domain; the query goes to the VPC-A
      DNS resolver at VPC-CIDR+2 (e.g., 10.0.0.2). 3. The VPC DNS resolver checks Route 53
      private hosted zones associated with VPC-A. It finds service.internal is associated
      and returns the record (CNAME or A pointing to 10.1.0.25 in VPC-B). 4. EC2 in VPC-A
      now has the private IP of the service in VPC-B. 5. For the actual network traffic to
      reach VPC-B's 10.1.0.25, a VPC peering connection or Transit Gateway with appropriate
      routes must exist. DNS resolution and network routing are independent — resolving the
      name does not guarantee connectivity.
    source_refs:
      - "Route53/latest/DeveloperGuide/hosted-zones-private.html"
      - "vpc/latest/userguide/vpc-dns.html"
    required_entities:
      - "private hosted zone"
      - "VPC DNS resolver"
      - "DHCP options"
  constraints:
    must_mention:
      - "VPC-CIDR+2"
      - "association"
    must_not_claim:
      - "DNS resolution guarantees connectivity"
      - "cross-VPC PHZ automatic"
    max_tokens: 300

- id: "net-t4-004"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do CloudFront, Lambda@Edge, Cognito, and origin ALB interact to implement
    authenticated access to a private web application?
  ground_truth:
    answer: >
      Authentication flow: 1. User requests https://app.example.com — CloudFront distribution
      with Lambda@Edge on the viewer-request event. 2. Lambda@Edge checks for a valid session
      token (JWT stored in cookie). If absent or expired, Lambda@Edge redirects the user to
      Cognito Hosted UI (or triggers the Cognito login flow). 3. After successful login, Cognito
      issues JWT tokens; the browser is redirected back to CloudFront with an authorization code.
      Lambda@Edge on the viewer-request exchanges the code for tokens (via Cognito token endpoint),
      stores tokens in cookies, and forwards the original request. 4. CloudFront forwards the
      authenticated request to the origin ALB. 5. ALB listener rules can optionally enforce
      Cognito authentication natively (ALB OIDC auth action), providing a second layer. 6. ALB
      routes to private EC2 targets. The security group on EC2 allows only traffic from the ALB.
      Lambda@Edge handles token refresh on subsequent requests.
    source_refs:
      - "AmazonCloudFront/latest/DeveloperGuide/lambda-at-the-edge.html"
      - "cognito/latest/developerguide/cognito-user-pools-app-integration.html"
    required_entities:
      - "CloudFront"
      - "Lambda@Edge"
      - "Cognito"
      - "ALB"
  constraints:
    must_mention:
      - "JWT"
      - "viewer-request"
    must_not_claim:
      - "CloudFront natively enforces Cognito auth without Lambda@Edge"
      - "tokens stored in route table"
    max_tokens: 300

- id: "net-t4-005"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do NACLs, Security Groups, and VPC route tables interact to control traffic between
    a web tier subnet and a database tier subnet within the same VPC?
  ground_truth:
    answer: >
      Web-to-DB traffic flow with all three controls: 1. Route table: web subnet and DB subnet
      are in the same VPC, so the local route (VPC CIDR → local) covers intra-VPC traffic.
      No specific route needed for web-to-DB — all intra-VPC subnets route locally. 2. NACL
      (web subnet outbound): must allow outbound TCP on the DB port (e.g., 3306 for MySQL)
      to the DB subnet CIDR. 3. NACL (web subnet inbound): must allow inbound return traffic
      on ephemeral ports (1024-65535) from the DB subnet CIDR (NACLs are stateless). 4. NACL
      (DB subnet inbound): must allow inbound TCP on port 3306 from the web subnet CIDR.
      5. NACL (DB subnet outbound): must allow outbound on ephemeral ports to web subnet CIDR.
      6. Security group on DB instances: inbound rule allows TCP 3306 from the web tier
      security group (or web subnet CIDR). Security groups are stateful — no explicit outbound
      rule needed on DB SG. Security group on web instances: outbound allows TCP 3306 to DB SG.
    source_refs:
      - "vpc/latest/userguide/vpc-network-acls.html"
      - "vpc/latest/userguide/vpc-security-groups.html"
    required_entities:
      - "NACL"
      - "Security Group"
      - "route table"
      - "ephemeral ports"
  constraints:
    must_mention:
      - "ephemeral ports"
      - "stateless"
    must_not_claim:
      - "NACLs not needed for intra-VPC traffic"
      - "Security Groups handle return traffic automatically through NACL"
    max_tokens: 300

- id: "net-t4-006"
  tier: 4
  type: relational
  hops: 3
  question: >
    How does Direct Connect Gateway relate to Virtual Private Gateways and Transit Gateway
    in connecting multiple VPCs across multiple regions to on-premises?
  ground_truth:
    answer: >
      Direct Connect Gateway (DXGW) is a global AWS resource (not region-scoped) that allows
      a single Direct Connect connection to reach multiple VPCs in multiple regions.
      DXGW with VGW (private VIF): Associate the DXGW with Virtual Private Gateways in up to
      10 VPCs across any regions. Each VPC uses a Private VIF on the Direct Connect connection
      through the DXGW. VPC-to-VPC traffic does not route through DXGW (only on-premises to
      VPC). Limitation: VPC CIDRs must not overlap with on-premises.
      DXGW with Transit Gateway (transit VIF): One Transit VIF connects the Direct Connect
      connection to the DXGW, which is then associated with TGWs. Each TGW can have attached
      VPCs. This enables one Direct Connect to reach hundreds of VPCs through one or more TGWs.
      VPC-to-VPC traffic can route through the TGW (not through DXGW). DXGW + TGW is the
      recommended architecture for large-scale hybrid connectivity.
    source_refs:
      - "directconnect/latest/UserGuide/direct-connect-gateways.html"
      - "vpc/latest/tgw/tgw-dcgw.html"
    required_entities:
      - "Direct Connect Gateway"
      - "Virtual Private Gateway"
      - "Transit Gateway"
      - "Private VIF"
  constraints:
    must_mention:
      - "global resource"
      - "Transit VIF"
    must_not_claim:
      - "DXGW is region-scoped"
      - "VPC-to-VPC routes through DXGW"
    max_tokens: 300

- id: "net-t4-007"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do Route 53 health checks, CloudWatch alarms, and SNS work together to create
    an automated alerting pipeline for endpoint failures?
  ground_truth:
    answer: >
      Route 53 health check → CloudWatch alarm → SNS pipeline: 1. Route 53 health checkers
      monitor an endpoint (HTTP/HTTPS/TCP from multiple locations globally). Health check
      state is published as a CloudWatch metric (HealthCheckStatus: 1 = healthy, 0 = unhealthy)
      in the us-east-1 region (Route 53 metrics are always in us-east-1). 2. Create a
      CloudWatch alarm on the HealthCheckStatus metric: threshold < 1 for N consecutive
      periods triggers ALARM state. 3. Configure the CloudWatch alarm action to publish to an
      SNS topic. 4. SNS topic subscribers receive the notification (email, SMS, Lambda, PagerDuty
      webhook). For private resources (inside VPC), Route 53 health checkers cannot reach
      them — use a CloudWatch Alarm-based health check (monitoring an EC2 metric or custom
      health metric) as the Route 53 health check source instead.
    source_refs:
      - "Route53/latest/DeveloperGuide/health-checks-monitor-view-status.html"
      - "AmazonCloudWatch/latest/monitoring/AlarmThatSendsEmail.html"
    required_entities:
      - "Route 53 health check"
      - "CloudWatch alarm"
      - "SNS"
  constraints:
    must_mention:
      - "us-east-1"
      - "HealthCheckStatus"
    must_not_claim:
      - "Route 53 alerts directly without CloudWatch"
      - "health checkers reach private IPs"
    max_tokens: 300

- id: "net-t4-008"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do VPC Flow Logs, GuardDuty, and Security Hub relate to each other in an AWS
    network threat detection and aggregation pipeline?
  ground_truth:
    answer: >
      Layered threat detection: VPC Flow Logs capture IP traffic metadata (source/destination
      IPs, ports, protocol, accept/reject) and publish to CloudWatch Logs or S3. GuardDuty
      ingests VPC Flow Logs automatically (along with CloudTrail and DNS logs) without
      requiring you to explicitly enable them — it uses its own copy. GuardDuty applies ML
      and threat intelligence to detect findings (e.g., UnauthorizedAccess:EC2/MaliciousIPCaller,
      Recon:EC2/PortProbeUnprotectedPort). GuardDuty findings are sent to Security Hub
      automatically (when Security Hub integration is enabled). Security Hub aggregates
      findings from GuardDuty, Macie, Inspector, Firewall Manager, and third-party tools,
      providing a unified security dashboard with severity scoring (ASFF format). Security
      Hub can trigger EventBridge rules for automated response (e.g., isolate an EC2 instance
      when a critical finding is generated). VPC Flow Logs alone require manual Athena/Logs
      Insights queries; GuardDuty automates the threat detection.
    source_refs:
      - "guardduty/latest/ug/what-is-guardduty.html"
      - "securityhub/latest/userguide/what-is-securityhub.html"
    required_entities:
      - "VPC Flow Logs"
      - "GuardDuty"
      - "Security Hub"
  constraints:
    must_mention:
      - "GuardDuty"
      - "Security Hub"
    must_not_claim:
      - "GuardDuty requires manual Flow Log setup"
      - "VPC Flow Logs and GuardDuty are redundant"
    max_tokens: 300

- id: "net-t4-009"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do Elastic Load Balancing, Auto Scaling, and Route 53 weighted routing work
    together for a zero-downtime blue-green deployment?
  ground_truth:
    answer: >
      Blue-green with ELB + ASG + Route 53: 1. Two environments: Blue (current production)
      with its own ASG and ALB; Green (new version) with its own ASG and ALB. 2. Route 53
      weighted routing: Blue record = weight 100, Green record = weight 0. All traffic goes
      to Blue. 3. Deploy and validate the new version on the Green ASG/ALB (smoke tests,
      health checks). 4. Gradually shift traffic: set Blue weight = 90, Green weight = 10.
      Monitor error rates and latency on both. 5. Continue shifting weights (50/50, then 10/90)
      as confidence grows. Route 53 TTL should be low (60s) for responsive shifting. 6. Once
      100% on Green, set Blue weight = 0. Blue ASG remains available for rollback. 7. Rollback:
      set Blue weight = 100, Green = 0 immediately. The key benefit: no DNS change required
      to roll back — only weight adjustment. Deregister Blue ASG instances from its ALB after
      a cooldown period to confirm no rollback needed.
    source_refs:
      - "Route53/latest/DeveloperGuide/routing-policy-weighted.html"
      - "autoscaling/ec2/userguide/what-is-amazon-ec2-auto-scaling.html"
    required_entities:
      - "ALB"
      - "Auto Scaling Group"
      - "Route 53 weighted routing"
  constraints:
    must_mention:
      - "weighted routing"
      - "rollback"
    must_not_claim:
      - "downtime required for deployment"
      - "single ALB for blue-green"
    max_tokens: 300

- id: "net-t4-010"
  tier: 4
  type: relational
  hops: 3
  question: >
    How do Transit Gateway, AWS RAM (Resource Access Manager), and cross-account VPC
    attachments relate to each other for a centralized networking account model?
  ground_truth:
    answer: >
      Centralized networking with TGW + RAM: A dedicated Networking account owns the Transit
      Gateway. To share the TGW with spoke accounts (without account boundaries blocking
      attachment), the Networking account uses AWS RAM to share the TGW resource with specific
      accounts or the entire AWS Organization. RAM makes the TGW visible in spoke accounts'
      consoles. Spoke accounts then create TGW VPC attachments from their own VPCs to the
      shared TGW — the attachment request appears in the Networking account for acceptance
      (or auto-accept if configured). The Networking account manages all TGW route tables,
      adding routes for each spoke VPC's CIDR. VPC route tables in spoke accounts point to
      the TGW for cross-account traffic. This model centralizes network management (one TGW,
      one set of route tables) while each account retains ownership of its VPCs. On-premises
      connectivity (Direct Connect or VPN) terminates in the Networking account's TGW.
    source_refs:
      - "vpc/latest/tgw/tgw-sharing.html"
      - "ram/latest/userguide/what-is.html"
    required_entities:
      - "Transit Gateway"
      - "AWS RAM"
      - "TGW attachment"
      - "Networking account"
  constraints:
    must_mention:
      - "RAM"
      - "share"
    must_not_claim:
      - "TGW automatically visible in all accounts"
      - "each account needs its own TGW"
    max_tokens: 300
