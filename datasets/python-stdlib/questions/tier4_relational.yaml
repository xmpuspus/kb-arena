- id: "py-t4-001"
  tier: 4
  type: relational
  hops: 3
  question: "If I use json.loads() with a custom object_hook, what exceptions could propagate from the object_hook callback?"
  ground_truth:
    answer: "json.loads() calls the object_hook callable for every JSON object decoded. Any exception raised inside object_hook propagates up through json.loads() unchanged — it is not caught by the json module. json.JSONDecodeError is raised for malformed JSON before object_hook is ever called. If object_hook raises ValueError, TypeError, KeyError, or any other exception, those propagate to the caller of json.loads()."
    source_refs:
      - "json.html#json.loads"
    required_entities:
      - "json.loads"
      - "object_hook"
      - "json.JSONDecodeError"
  constraints:
    must_mention:
      - "object_hook"
      - "propagate"
      - "JSONDecodeError"
    must_not_claim:
      - "json catches all exceptions"
      - "only JSONDecodeError"

- id: "py-t4-002"
  tier: 4
  type: relational
  hops: 3
  question: "What is the chain of modules involved when urllib.request.urlopen() makes an HTTPS connection?"
  ground_truth:
    answer: "urllib.request.urlopen() → HTTPSHandler (urllib.request) → http.client.HTTPSConnection → socket module (creates TCP socket) → ssl module (wraps socket with TLS via ssl.SSLContext) → ssl verifies certificate using the system trust store or certifi. The ssl.create_default_context() is called implicitly, which enforces hostname verification and certificate chain validation."
    source_refs:
      - "urllib.request.html"
      - "http.client.html"
      - "ssl.html"
    required_entities:
      - "urllib.request"
      - "http.client.HTTPSConnection"
      - "ssl"
      - "socket"
  constraints:
    must_mention:
      - "ssl"
      - "http.client"
      - "socket"
    must_not_claim:
      - "urllib does its own TLS"
      - "no certificate verification"

- id: "py-t4-003"
  tier: 4
  type: relational
  hops: 3
  question: "What happens to resources held by a threading.Thread when it raises an unhandled exception?"
  ground_truth:
    answer: "When a thread raises an unhandled exception, threading.excepthook is called (Python 3.8+). The thread terminates but other threads continue running. Resources held by the thread (Locks, files, sockets) are NOT automatically released. Locks acquired before the exception will remain locked, causing deadlocks in other threads waiting on them. Use try/finally or context managers inside threads to ensure resource cleanup."
    source_refs:
      - "threading.html#threading.excepthook"
      - "threading.html#threading.Thread"
    required_entities:
      - "threading.Thread"
      - "threading.excepthook"
    required_entities:
      - "threading.Lock"
  constraints:
    must_mention:
      - "excepthook"
      - "deadlock"
      - "resources"
    must_not_claim:
      - "locks are released automatically"
      - "all threads stop"

- id: "py-t4-004"
  tier: 4
  type: relational
  hops: 3
  question: "If a context manager's __exit__ method returns True, what happens to an exception raised inside the 'with' block?"
  ground_truth:
    answer: "If __exit__ returns a truthy value, the exception is suppressed — it does not propagate. Execution continues normally after the with block. contextlib.suppress() works this way. If __exit__ returns False or None, the exception propagates. If __exit__ raises a new exception, that replaces the original. The __exit__ receives the exception type, value, and traceback as arguments."
    source_refs:
      - "reference/datamodel.html#object.__exit__"
      - "contextlib.html#contextlib.suppress"
    required_entities:
      - "__exit__"
      - "contextlib.suppress"
  constraints:
    must_mention:
      - "__exit__"
      - "suppressed"
      - "propagate"
    must_not_claim:
      - "exception always propagates"
      - "__exit__ cannot suppress"

- id: "py-t4-005"
  tier: 4
  type: relational
  hops: 4
  question: "What is the dependency chain when asyncio.create_subprocess_exec() runs an external process and reads its stdout?"
  ground_truth:
    answer: "asyncio.create_subprocess_exec() → asyncio's event loop → subprocess (OS-level fork/exec via os.execvp or CreateProcess on Windows) → asyncio.subprocess.Process wraps the Popen handles → asyncio.StreamReader reads stdout bytes via the event loop's add_reader or IOCP → asyncio.StreamReader.readline()/read() returns coroutines awaited by the caller."
    source_refs:
      - "asyncio-subprocess.html"
      - "asyncio-stream.html"
    required_entities:
      - "asyncio.create_subprocess_exec"
      - "asyncio.subprocess.Process"
      - "asyncio.StreamReader"
  constraints:
    must_mention:
      - "asyncio"
      - "subprocess"
      - "StreamReader"
    must_not_claim:
      - "blocking"
      - "subprocess.run"

- id: "py-t4-006"
  tier: 4
  type: relational
  hops: 3
  question: "What modules and classes are involved in Python's import system when importing a package?"
  ground_truth:
    answer: "Python's import system: importlib.machinery (finders/loaders) → sys.meta_path (list of finders, including PathFinder) → importlib.machinery.FileFinder (finds files on sys.path) → importlib.machinery.SourceFileLoader (reads .py files) → compile() (produces code object) → exec() in module's __dict__. The import system is extensible via sys.meta_path and sys.path_hooks."
    source_refs:
      - "importlib.html"
      - "sys.html#sys.meta_path"
    required_entities:
      - "importlib"
      - "sys.meta_path"
      - "importlib.machinery.FileFinder"
  constraints:
    must_mention:
      - "sys.meta_path"
      - "importlib"
      - "loader"
    must_not_claim:
      - "import is not extensible"
      - "only sys.path"

- id: "py-t4-007"
  tier: 4
  type: relational
  hops: 3
  question: "How does pickle.loads() loading a pickled object interact with the class definition? What can go wrong?"
  ground_truth:
    answer: "pickle.loads() reconstructs objects by calling the class's __new__ and __setstate__ (or __reduce__/__reduce_ex__). The class must be importable from its original module path at load time. If the class has been moved, renamed, or deleted, ImportError or AttributeError is raised. Malicious pickled data can execute arbitrary code via __reduce__ returning a callable — never unpickle untrusted data. Module version changes (added/removed attributes) can cause AttributeError in __setstate__."
    source_refs:
      - "pickle.html"
    required_entities:
      - "pickle.loads"
      - "__reduce__"
      - "__setstate__"
  constraints:
    must_mention:
      - "__reduce__"
      - "arbitrary code"
      - "untrusted"
    must_not_claim:
      - "pickle is safe"
      - "no side effects"

- id: "py-t4-008"
  tier: 4
  type: relational
  hops: 3
  question: "What is the relationship between os.fork(), multiprocessing.Process, and copy-on-write memory?"
  ground_truth:
    answer: "os.fork() creates a child process via the OS fork syscall — child inherits parent's memory via copy-on-write (COW). Pages are shared until written. multiprocessing.Process with 'fork' start method calls os.fork() internally. COW means forking is fast initially but memory diverges as child writes. On macOS and Python 3.12+, the default start method changed to 'spawn' (not 'fork') due to fork safety issues with threads and the ObjC runtime. Forking with threads can cause deadlocks."
    source_refs:
      - "os.html#os.fork"
      - "multiprocessing.html#contexts-and-start-methods"
    required_entities:
      - "os.fork"
      - "multiprocessing.Process"
    required_entities:
      - "copy-on-write"
  constraints:
    must_mention:
      - "fork"
      - "copy-on-write"
      - "spawn"
    must_not_claim:
      - "fork is safe with threads"
      - "no memory sharing"

- id: "py-t4-009"
  tier: 4
  type: relational
  hops: 3
  question: "What chain of exceptions can occur when ssl.SSLContext.wrap_socket() fails during an HTTPS handshake?"
  ground_truth:
    answer: "ssl.SSLContext.wrap_socket() can raise: ssl.SSLCertVerificationError (certificate validation failed, subclass of ssl.SSLError) when the server certificate is untrusted or expired; ssl.SSLError for general TLS protocol errors; ConnectionRefusedError or OSError if the underlying socket connection failed before TLS; socket.timeout if connection times out. SSLCertVerificationError → SSLError → OSError → Exception is the exception hierarchy."
    source_refs:
      - "ssl.html#ssl.SSLCertVerificationError"
      - "ssl.html#ssl.SSLError"
    required_entities:
      - "ssl.SSLCertVerificationError"
      - "ssl.SSLError"
      - "OSError"
  constraints:
    must_mention:
      - "SSLCertVerificationError"
      - "SSLError"
      - "certificate"
    must_not_claim:
      - "only SSLError"
      - "no hierarchy"

- id: "py-t4-010"
  tier: 4
  type: relational
  hops: 4
  question: "When re.compile() is used with re.VERBOSE flag, how does it affect whitespace and comments in the pattern?"
  ground_truth:
    answer: "re.VERBOSE (re.X) allows pattern whitespace to be ignored and # to start comments within the pattern. Unescaped whitespace in the pattern is ignored. To include literal whitespace, escape it (\\s, [ ], or \\  with backslash). Comments run to end of line. This makes complex patterns readable by splitting across lines. re.compile(pattern, re.VERBOSE) produces the same match object as the compact equivalent."
    source_refs:
      - "re.html#re.VERBOSE"
      - "re.html#re.compile"
    required_entities:
      - "re.VERBOSE"
      - "re.compile"
  constraints:
    must_mention:
      - "re.VERBOSE"
      - "whitespace"
      - "comments"
    must_not_claim:
      - "changes match semantics"
      - "slower"

- id: "py-t4-011"
  tier: 4
  type: relational
  hops: 3
  question: "What happens when a Generator function uses 'return value' instead of 'return' or just falls off the end?"
  ground_truth:
    answer: "When a generator function executes 'return value', it raises StopIteration with the value as the exception's value attribute. The caller of next() sees StopIteration. When using 'yield from', the return value of a subgenerator becomes the value of the 'yield from' expression. A bare 'return' raises StopIteration with value=None."
    source_refs:
      - "reference/expressions.html#yield-expressions"
      - "reference/simple_stmts.html#return"
    required_entities:
      - "StopIteration"
      - "generator"
      - "yield from"
  constraints:
    must_mention:
      - "StopIteration"
      - "yield from"
    must_not_claim:
      - "return is not allowed in generators"
      - "raises SyntaxError"

- id: "py-t4-012"
  tier: 4
  type: relational
  hops: 3
  question: "What is the dependency chain between typing.get_type_hints(), inspect.signature(), and function annotations at runtime?"
  ground_truth:
    answer: "Function annotations are stored in __annotations__ dict on the function object. typing.get_type_hints() evaluates string annotations (PEP 563 forward references) by resolving them in the module's globals and locals — it imports sys.modules and looks up names. inspect.signature() reads __annotations__ for parameter type hints and also processes __wrapped__ for decorated functions. In Python 3.10+ with 'from __future__ import annotations', all annotations are strings by default."
    source_refs:
      - "typing.html#typing.get_type_hints"
      - "inspect.html#inspect.signature"
    required_entities:
      - "typing.get_type_hints"
      - "inspect.signature"
      - "__annotations__"
  constraints:
    must_mention:
      - "__annotations__"
      - "get_type_hints"
      - "forward references"
    must_not_claim:
      - "annotations are always evaluated"
      - "inspect.signature is deprecated"
