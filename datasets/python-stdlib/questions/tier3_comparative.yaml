- id: "py-t3-001"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare queue.Queue, collections.deque, and list for producer-consumer patterns. What are the tradeoffs?"
  ground_truth:
    answer: "queue.Queue: thread-safe with blocking put()/get(), supports maxsize, best for producer-consumer with blocking semantics. collections.deque: thread-safe for append/pop from either end, no blocking, maxlen for bounded buffer. list: NOT thread-safe for concurrent access, no blocking. For producer-consumer: queue.Queue is the idiomatic choice. deque works with external synchronization. list requires a Lock and is least efficient."
    source_refs:
      - "queue.html"
      - "collections.html#collections.deque"
    required_entities:
      - "queue.Queue"
      - "collections.deque"
      - "list"
  constraints:
    must_mention:
      - "thread-safe"
      - "blocking"
    must_not_claim:
      - "list is thread-safe"
      - "deque has blocking"

- id: "py-t3-002"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the tradeoffs between os.path and pathlib for path manipulation in Python 3.10+?"
  ground_truth:
    answer: "os.path: string-based, works with any string, widely compatible, faster for simple ops. pathlib.Path: object-oriented, chainable, reads like spoken language (path / 'subdir'), has .stem, .suffix, .parent, glob() built-in. pathlib.Path is strongly preferred in Python 3.6+. os.path is still used for low-level I/O and when interoperability with C extensions requiring strings is needed. pathlib can call os.fspath() to get the string representation."
    source_refs:
      - "os.path.html"
      - "pathlib.html"
    required_entities:
      - "os.path"
      - "pathlib.Path"
  constraints:
    must_mention:
      - "pathlib"
      - "os.path"
      - "string"
    must_not_claim:
      - "os.path is deprecated"
      - "identical"

- id: "py-t3-003"
  tier: 3
  type: comparative
  hops: 2
  question: "When should you use threading.Lock vs threading.RLock vs threading.Semaphore?"
  ground_truth:
    answer: "threading.Lock: simple mutual exclusion, one thread holds at a time, cannot be acquired twice by same thread (deadlocks). threading.RLock (reentrant): can be acquired multiple times by the same thread — needed when recursive functions acquire the same lock. threading.Semaphore: allows N threads simultaneously, not just 1 — used for resource pools (e.g., limit concurrent DB connections). Use Lock for simple mutual exclusion, RLock for recursive code, Semaphore for counting resources."
    source_refs:
      - "threading.html#threading.Lock"
      - "threading.html#threading.RLock"
      - "threading.html#threading.Semaphore"
    required_entities:
      - "threading.Lock"
      - "threading.RLock"
      - "threading.Semaphore"
  constraints:
    must_mention:
      - "RLock"
      - "Semaphore"
      - "reentrant"
    must_not_claim:
      - "RLock is always better"
      - "identical"

- id: "py-t3-004"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare subprocess.run(), subprocess.Popen(), and os.system() for running shell commands."
  ground_truth:
    answer: "os.system(): runs command in shell, returns exit code only, blocks, no output capture — deprecated for new code. subprocess.run(): high-level, synchronous, captures stdout/stderr via capture_output=True, returns CompletedProcess. subprocess.Popen(): low-level, non-blocking, streaming I/O, process control (send signals, kill). Use subprocess.run() for simple cases, Popen() for streaming or interactive processes. Never use os.system() for new code."
    source_refs:
      - "subprocess.html#subprocess.run"
      - "subprocess.html#subprocess.Popen"
      - "os.html#os.system"
    required_entities:
      - "subprocess.run"
      - "subprocess.Popen"
      - "os.system"
  constraints:
    must_mention:
      - "subprocess.run"
      - "Popen"
      - "capture"
    must_not_claim:
      - "os.system is recommended"
      - "identical"

- id: "py-t3-005"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the differences between copy.copy() and copy.deepcopy() for nested data structures?"
  ground_truth:
    answer: "copy.copy() creates a shallow copy — the top-level object is new but nested objects are shared references. copy.deepcopy() recursively copies all objects — fully independent copy with no shared state. For a list of lists: copy.copy() gives a new outer list but inner lists are shared; mutating inner list affects both. deepcopy is slower and uses more memory but is safe for mutation. Immutable objects (int, str, tuple of immutables) are safe with either."
    source_refs:
      - "copy.html"
    required_entities:
      - "copy.copy"
      - "copy.deepcopy"
  constraints:
    must_mention:
      - "shallow"
      - "deep"
      - "nested"
    must_not_claim:
      - "identical"
      - "deepcopy is always needed"

- id: "py-t3-006"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare argparse, optparse, and getopt for command-line argument parsing. Which should be used?"
  ground_truth:
    answer: "getopt: low-level, C-style option parsing, minimal features. optparse: deprecated since Python 3.2, limited to options (no positional args type checking). argparse: current standard, supports subcommands, positional and optional args, type conversion, help generation, mutual exclusion. Use argparse for all new code. optparse is deprecated. getopt only for compatibility with existing scripts."
    source_refs:
      - "argparse.html"
      - "optparse.html"
      - "getopt.html"
    required_entities:
      - "argparse"
      - "optparse"
      - "getopt"
  constraints:
    must_mention:
      - "argparse"
      - "deprecated"
    must_not_claim:
      - "getopt is recommended"
      - "optparse is current"

- id: "py-t3-007"
  tier: 3
  type: comparative
  hops: 2
  question: "When should you use asyncio.gather() vs asyncio.TaskGroup vs asyncio.as_completed()?"
  ground_truth:
    answer: "asyncio.gather(): runs coroutines concurrently, collects results in order, one failure cancels all by default (return_exceptions=True to suppress). asyncio.TaskGroup (Python 3.11+): structured concurrency, automatically cancels remaining tasks on first exception, preferred for error safety. asyncio.as_completed(): returns futures as they complete (unordered) — best when you want to process results as they arrive. Use TaskGroup for structured work, gather() for result collection, as_completed() for first-result-wins patterns."
    source_refs:
      - "asyncio-task.html#asyncio.gather"
      - "asyncio-task.html#asyncio.TaskGroup"
      - "asyncio-task.html#asyncio.as_completed"
    required_entities:
      - "asyncio.gather"
      - "asyncio.TaskGroup"
      - "asyncio.as_completed"
  constraints:
    must_mention:
      - "asyncio.gather"
      - "TaskGroup"
      - "as_completed"
    must_not_claim:
      - "identical"
      - "TaskGroup is slower"

- id: "py-t3-008"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare struct.pack() and ctypes for binary data manipulation in Python."
  ground_truth:
    answer: "struct.pack(): simple format-string-based packing/unpacking of fixed-format binary data. Fast for fixed schemas (network protocols, file formats). ctypes: full C type system including structs, unions, pointers, function pointers. ctypes can call C shared libraries directly. struct is simpler for straightforward binary I/O; ctypes is required for C interoperability, foreign function calling, and complex C struct layouts."
    source_refs:
      - "struct.html"
      - "ctypes.html"
    required_entities:
      - "struct"
      - "ctypes"
  constraints:
    must_mention:
      - "struct"
      - "ctypes"
      - "binary"
    must_not_claim:
      - "interchangeable"
      - "ctypes cannot call C"

- id: "py-t3-009"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the tradeoffs between shelve, sqlite3, and json for simple key-value persistence?"
  ground_truth:
    answer: "shelve: Python-object persistence using pickle under the hood, dict-like API, keys must be strings. Not portable across Python versions. sqlite3: SQL-capable, portable, cross-language, ACID-compliant. Requires schema definition. json: human-readable text, not a database (whole file read/write), no querying. For small K/V storage: shelve is simplest. For querying and reliability: sqlite3. For config/interop: json. shelve has security risk from pickle."
    source_refs:
      - "shelve.html"
      - "sqlite3.html"
      - "json.html"
    required_entities:
      - "shelve"
      - "sqlite3"
      - "json"
  constraints:
    must_mention:
      - "shelve"
      - "sqlite3"
      - "pickle"
    must_not_claim:
      - "shelve is safe for untrusted data"

- id: "py-t3-010"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare logging.basicConfig() vs logging.config.dictConfig() for configuring the logging system."
  ground_truth:
    answer: "logging.basicConfig(): simple one-call setup for the root logger, only effective if no handlers are configured yet, limited options. logging.config.dictConfig(): full configuration via a dictionary defining loggers, handlers, formatters, filters — suitable for production and complex setups. logging.config.fileConfig() reads INI-format config. For production apps, dictConfig() is preferred because it's declarative, version-controllable, and can be loaded from a YAML/JSON config file."
    source_refs:
      - "logging.html#logging.basicConfig"
      - "logging.config.html#logging.config.dictConfig"
    required_entities:
      - "logging.basicConfig"
      - "logging.config.dictConfig"
  constraints:
    must_mention:
      - "basicConfig"
      - "dictConfig"
    must_not_claim:
      - "basicConfig is recommended for production"
      - "identical"

- id: "py-t3-011"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the performance differences between str concatenation, str.join(), and io.StringIO for building large strings?"
  ground_truth:
    answer: "str concatenation (+=): O(n^2) in a loop because strings are immutable — each concatenation creates a new string. str.join(): O(n) — computes total length first, allocates once. io.StringIO: O(n) with write(), getvalue() returns the assembled string. For building strings in a loop: ''.join(parts) is the idiomatic O(n) approach. io.StringIO is useful when you need a file-like interface. String concatenation is acceptable for a small fixed number of strings."
    source_refs:
      - "stdtypes.html#str.join"
      - "io.html#io.StringIO"
    required_entities:
      - "str.join"
      - "io.StringIO"
  constraints:
    must_mention:
      - "str.join"
      - "StringIO"
      - "concatenation"
    must_not_claim:
      - "concatenation is O(n)"
      - "identical performance"

- id: "py-t3-012"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare threading, multiprocessing, and asyncio for handling concurrent I/O-bound operations."
  ground_truth:
    answer: "threading: uses OS threads, GIL limits CPU parallelism but I/O releases GIL, simpler code with shared memory but race conditions. multiprocessing: separate processes bypass GIL, more memory overhead, communication via Queue/Pipe with pickle overhead. asyncio: cooperative multitasking via coroutines, single thread, very low overhead, requires async-compatible libraries, best for high-concurrency I/O. For I/O-bound: asyncio scales best. threading is simpler. multiprocessing is for CPU-bound work."
    source_refs:
      - "threading.html"
      - "multiprocessing.html"
      - "asyncio.html"
    required_entities:
      - "threading"
      - "multiprocessing"
      - "asyncio"
  constraints:
    must_mention:
      - "GIL"
      - "asyncio"
      - "I/O"
    must_not_claim:
      - "GIL affects asyncio"
      - "identical"

- id: "py-t3-013"
  tier: 3
  type: comparative
  hops: 2
  question: "When should you use functools.cached_property vs functools.lru_cache for caching computed attributes?"
  ground_truth:
    answer: "functools.cached_property: caches the result of a method on the instance's __dict__, so subsequent accesses bypass the descriptor entirely. Per-instance cache, no arguments. functools.lru_cache: caches by function arguments across all calls, not per-instance. For properties (no-arg methods on instances): cached_property is idiomatic. For functions with arguments: lru_cache. cached_property doesn't work on classes with __slots__ without a __dict__."
    source_refs:
      - "functools.html#functools.cached_property"
      - "functools.html#functools.lru_cache"
    required_entities:
      - "functools.cached_property"
      - "functools.lru_cache"
  constraints:
    must_mention:
      - "cached_property"
      - "lru_cache"
      - "instance"
    must_not_claim:
      - "identical"
      - "lru_cache works for properties"

- id: "py-t3-014"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare xml.etree.ElementTree, xml.dom.minidom, and xml.sax for parsing XML in Python's stdlib."
  ground_truth:
    answer: "xml.etree.ElementTree: tree-based, Pythonic API, good for moderate-sized XML, C-accelerated. Most commonly used. xml.dom.minidom: W3C DOM-compliant, more verbose, good for DOM-compatible code. xml.sax: event-driven streaming parser for very large XML files, lower memory, more complex code. For most use cases: ElementTree. For large files: SAX. For W3C DOM compliance: minidom. None of these are safe against XML bomb/XXE attacks by default — use defusedxml in production."
    source_refs:
      - "xml.etree.elementtree.html"
      - "xml.dom.minidom.html"
      - "xml.sax.html"
    required_entities:
      - "xml.etree.ElementTree"
      - "xml.dom.minidom"
      - "xml.sax"
  constraints:
    must_mention:
      - "ElementTree"
      - "SAX"
      - "streaming"
    must_not_claim:
      - "ElementTree handles huge files"
      - "minidom is fastest"

- id: "py-t3-015"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the tradeoffs between using set operations vs filter()/list comprehension for membership testing and deduplication?"
  ground_truth:
    answer: "set operations (intersection, union, difference): O(min(m,n)) or O(n) depending on operation, uses hash-based lookups. Best for set algebra and deduplication. list comprehension with `in`: O(n) per membership test — O(n^2) overall for filtering. filter(): functional style, lazy iterator, same complexity as list comprehension. For deduplication: set() is O(n) and idiomatic. For membership testing in a loop: convert to set first. filter() has no performance advantage over list comprehension."
    source_refs:
      - "stdtypes.html#set"
      - "functions.html#filter"
    required_entities:
      - "set"
      - "filter"
  constraints:
    must_mention:
      - "set"
      - "O(n)"
      - "membership"
    must_not_claim:
      - "filter is faster than set"
      - "identical complexity"
