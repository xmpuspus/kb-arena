- id: "storage-t1-001"
  tier: 1
  type: factoid
  hops: 1
  question: "What is Amazon S3 and what are its storage classes?"
  ground_truth:
    answer: >
      Amazon S3 is an object storage service offering industry-leading durability (11 nines),
      scalability, and availability. Storage classes: S3 Standard (frequent access), S3
      Intelligent-Tiering (unknown/changing access patterns, auto-tiering), S3 Standard-IA
      (infrequent access, millisecond retrieval), S3 One Zone-IA (single AZ, lower cost),
      S3 Glacier Instant Retrieval (archive, millisecond access), S3 Glacier Flexible
      Retrieval (minutes to hours), and S3 Glacier Deep Archive (12-hour retrieval, lowest
      cost). All classes except One Zone-IA store data across at least 3 AZs.
    source_refs:
      - "AmazonS3/latest/userguide/storage-class-intro.html"
    required_entities:
      - "S3"
      - "storage class"
      - "S3 Intelligent-Tiering"
  constraints:
    must_mention:
      - "object storage"
      - "Glacier"
    must_not_claim:
      - "block storage"
      - "single availability zone for all classes"
    max_tokens: 200

- id: "storage-t1-002"
  tier: 1
  type: factoid
  hops: 1
  question: "What is Amazon EBS and what volume types does it offer?"
  ground_truth:
    answer: >
      Amazon Elastic Block Store (EBS) is a block storage service for use with EC2 instances.
      Volume types: gp3 (General Purpose SSD, 3,000 IOPS baseline, up to 16,000 IOPS, 125
      MB/s baseline), gp2 (older General Purpose SSD, 3 IOPS/GB), io2 Block Express (highest
      performance SSD, up to 256,000 IOPS, 4,000 MB/s), io1 (Provisioned IOPS SSD, up to
      64,000 IOPS), st1 (Throughput Optimized HDD, big data workloads), and sc1 (Cold HDD,
      lowest cost for infrequently accessed data). EBS volumes persist independently of the
      EC2 instance lifecycle and can be attached to one instance at a time (except io1/io2
      Multi-Attach).
    source_refs:
      - "ec2/latest/userguide/ebs-volume-types.html"
    required_entities:
      - "EBS"
      - "gp3"
      - "io2"
  constraints:
    must_mention:
      - "block storage"
      - "gp3"
    must_not_claim:
      - "object storage"
      - "EBS is shared across instances by default"
    max_tokens: 200

- id: "storage-t1-003"
  tier: 1
  type: factoid
  hops: 1
  question: "What is Amazon EFS and what performance modes does it support?"
  ground_truth:
    answer: >
      Amazon Elastic File System (EFS) is a fully managed, serverless NFS file system for
      Linux workloads. It scales automatically with no capacity to provision and stores data
      across multiple Availability Zones. Performance modes: General Purpose (default, lowest
      latency, suitable for web serving, content management, development) and Max I/O (higher
      aggregate throughput and IOPS, slightly higher latency, for highly parallelized workloads
      like big data analytics). Throughput modes: Bursting (throughput scales with file system
      size), Provisioned (specify throughput independent of storage), and Elastic (recommended,
      automatically scales up to 3 GB/s for reads and 1 GB/s for writes).
    source_refs:
      - "efs/latest/ug/performance.html"
    required_entities:
      - "EFS"
      - "NFS"
      - "General Purpose"
      - "Max I/O"
  constraints:
    must_mention:
      - "NFS"
      - "multi-AZ"
    must_not_claim:
      - "Windows workloads"
      - "block storage"
    max_tokens: 200

- id: "storage-t1-004"
  tier: 1
  type: factoid
  hops: 1
  question: "What is S3 Glacier and what retrieval options does it offer?"
  ground_truth:
    answer: >
      Amazon S3 Glacier is a low-cost archival storage service within S3. Three classes offer
      different retrieval speeds: S3 Glacier Instant Retrieval provides millisecond access
      (same as S3 Standard-IA but cheaper for quarterly access). S3 Glacier Flexible Retrieval
      (formerly Amazon Glacier) offers Expedited retrieval (1-5 minutes, higher cost), Standard
      retrieval (3-5 hours, default), and Bulk retrieval (5-12 hours, lowest cost). S3 Glacier
      Deep Archive is the lowest-cost option with Standard retrieval within 12 hours and Bulk
      retrieval within 48 hours. Minimum storage duration: 90 days for Glacier Instant and
      Flexible Retrieval, 180 days for Deep Archive.
    source_refs:
      - "AmazonS3/latest/userguide/storage-class-intro.html"
      - "amazonglacier/latest/dev/introduction.html"
    required_entities:
      - "S3 Glacier"
      - "S3 Glacier Deep Archive"
      - "retrieval"
  constraints:
    must_mention:
      - "Deep Archive"
      - "retrieval"
    must_not_claim:
      - "instant retrieval for all Glacier classes"
      - "no minimum storage duration"
    max_tokens: 200

- id: "storage-t1-005"
  tier: 1
  type: factoid
  hops: 1
  question: "What is Amazon FSx and what file system types does it support?"
  ground_truth:
    answer: >
      Amazon FSx is a fully managed service for launching high-performance file systems. Four
      offerings: FSx for Windows File Server (fully managed Windows native file system using
      SMB protocol, Active Directory integration, NTFS), FSx for Lustre (high-performance
      parallel file system for HPC, machine learning, and media processing, integrates with
      S3), FSx for NetApp ONTAP (full ONTAP functionality including NFS, SMB, iSCSI, SnapMirror,
      deduplication, compression), and FSx for OpenZFS (NFS-compatible, ZFS snapshots,
      cloning, compression). Each offers SSD storage options with sub-millisecond latency.
    source_refs:
      - "fsx/latest/WindowsGuide/what-is.html"
      - "fsx/latest/LustreGuide/what-is.html"
      - "fsx/latest/ONTAPGuide/what-is-fsx-ontap.html"
    required_entities:
      - "FSx"
      - "FSx for Lustre"
      - "FSx for Windows File Server"
  constraints:
    must_mention:
      - "Windows File Server"
      - "Lustre"
    must_not_claim:
      - "only one file system type"
      - "FSx for Linux"
    max_tokens: 200

- id: "storage-t1-006"
  tier: 1
  type: factoid
  hops: 1
  question: "What is AWS Storage Gateway and what gateway types does it offer?"
  ground_truth:
    answer: >
      AWS Storage Gateway is a hybrid cloud storage service that connects on-premises
      environments to AWS storage. Three gateway types: S3 File Gateway (presents an NFS/SMB
      interface to applications, stores files as objects in S3, supports all S3 storage
      classes), Tape Gateway (virtual tape library emulating physical tape infrastructure,
      stores virtual tapes in S3 and S3 Glacier), and Volume Gateway (iSCSI block storage
      interface with two modes — Stored Volumes: entire data set on-premises, asynchronous
      backup to S3; Cached Volumes: primary data in S3, frequently accessed data cached
      on-premises). FSx File Gateway also exists for on-premises access to FSx for Windows.
    source_refs:
      - "storagegateway/latest/userguide/WhatIsStorageGateway.html"
    required_entities:
      - "Storage Gateway"
      - "S3 File Gateway"
      - "Tape Gateway"
      - "Volume Gateway"
  constraints:
    must_mention:
      - "hybrid"
      - "on-premises"
    must_not_claim:
      - "only cloud-to-cloud"
      - "only one gateway type"
    max_tokens: 200

- id: "storage-t1-007"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the AWS Snow Family and what devices does it include?"
  ground_truth:
    answer: >
      The AWS Snow Family is a collection of physical devices for edge computing and data
      transfer into and out of AWS at petabyte scale. Devices: Snowcone (smallest, 8 TB
      HDD or 14 TB SSD, 2 vCPUs, 4 GB memory, battery-powered for harsh environments),
      Snowball Edge Storage Optimized (80 TB usable storage, 40 vCPUs, 80 GB memory for
      storage-heavy migrations and local processing), Snowball Edge Compute Optimized (28 TB
      SSD, 52 vCPUs, optional GPU, for ML inference and edge computing), and Snowmobile
      (exabyte-scale — a 45-foot shipping container holding up to 100 PB, for massive
      datacenter migrations).
    source_refs:
      - "snowball/latest/ug/whatissnowball.html"
      - "snowball/latest/snowcone-guide/snowcone-what-is-snowcone.html"
    required_entities:
      - "Snow Family"
      - "Snowcone"
      - "Snowball Edge"
      - "Snowmobile"
  constraints:
    must_mention:
      - "Snowball Edge"
      - "Snowmobile"
    must_not_claim:
      - "all devices are internet-based"
      - "Snowmobile is a software service"
    max_tokens: 200

- id: "storage-t1-008"
  tier: 1
  type: factoid
  hops: 1
  question: "What is AWS DataSync and what protocols does it support?"
  ground_truth:
    answer: >
      AWS DataSync is a fully managed data transfer service for automating and accelerating
      data movement between on-premises storage, edge locations, and AWS storage services.
      DataSync supports NFS, SMB, HDFS (Hadoop Distributed File System), and object storage
      protocols. Sources and destinations include: NFS servers, SMB shares, Hadoop clusters,
      self-managed object storage, Amazon S3, Amazon EFS, Amazon FSx for Windows File Server,
      FSx for Lustre, FSx for OpenZFS, and FSx for NetApp ONTAP. DataSync uses a software
      agent deployed on-premises to connect to the AWS DataSync service endpoint. It handles
      scheduling, encryption in transit, bandwidth throttling, and integrity verification.
    source_refs:
      - "datasync/latest/userguide/what-is-datasync.html"
    required_entities:
      - "DataSync"
      - "NFS"
      - "SMB"
  constraints:
    must_mention:
      - "on-premises"
      - "agent"
    must_not_claim:
      - "only S3 as destination"
      - "no encryption in transit"
    max_tokens: 200

- id: "storage-t1-009"
  tier: 1
  type: factoid
  hops: 1
  question: "What is AWS Transfer Family and what protocols does it support?"
  ground_truth:
    answer: >
      AWS Transfer Family is a fully managed service for transferring files into and out of
      Amazon S3 or Amazon EFS using standard file transfer protocols. Supported protocols:
      SFTP (SSH File Transfer Protocol), FTPS (FTP over SSL), FTP (unencrypted, for internal
      use behind VPC), and AS2 (Applicability Statement 2, for B2B EDI workflows). Transfer
      Family manages the file transfer infrastructure, including server capacity, OS patching,
      and availability. It integrates with existing authentication systems via AWS Directory
      Service, LDAP, or a custom identity provider Lambda function. Files appear directly in
      S3 or EFS, accessible via AWS APIs.
    source_refs:
      - "transfer/latest/userguide/what-is-aws-transfer-family.html"
    required_entities:
      - "Transfer Family"
      - "SFTP"
      - "FTPS"
      - "S3"
  constraints:
    must_mention:
      - "SFTP"
      - "S3"
    must_not_claim:
      - "only supports SFTP"
      - "requires custom server management"
    max_tokens: 200

- id: "storage-t1-010"
  tier: 1
  type: factoid
  hops: 1
  question: "What is AWS Backup and which AWS services does it support?"
  ground_truth:
    answer: >
      AWS Backup is a fully managed, policy-driven backup service that centralizes and
      automates data protection across AWS services. Supported services: Amazon EBS volumes,
      Amazon RDS databases (including Aurora), Amazon DynamoDB tables, Amazon EFS file
      systems, Amazon FSx for Windows File Server, FSx for Lustre, FSx for ONTAP, FSx for
      OpenZFS, Amazon EC2 instances (with EBS volumes), AWS Storage Gateway volumes, Amazon
      S3, Amazon DocumentDB, Amazon Neptune, Amazon Timestream, Amazon Redshift, and VMware
      workloads on-premises. AWS Backup uses backup plans (policies) to define backup
      frequency, retention, and destination backup vault, with cross-region and cross-account
      copy support.
    source_refs:
      - "aws-backup/latest/devguide/whatisbackup.html"
    required_entities:
      - "AWS Backup"
      - "backup plan"
      - "backup vault"
  constraints:
    must_mention:
      - "backup plan"
      - "cross-region"
    must_not_claim:
      - "only supports EBS"
      - "no cross-account support"
    max_tokens: 200

- id: "storage-t1-011"
  tier: 1
  type: factoid
  hops: 1
  question: "What is S3 Object Lock and what retention modes does it provide?"
  ground_truth:
    answer: >
      S3 Object Lock enforces WORM (Write Once Read Many) storage for objects, preventing
      deletion or overwriting for a specified retention period. Two retention modes: Governance
      mode (users with s3:BypassGovernanceRetention permission can override or delete; used
      for testing and non-strict compliance requirements) and Compliance mode (no user,
      including the root account, can delete or modify an object for the duration of the
      retention period; cannot be shortened; used for regulatory WORM requirements like SEC
      17a-4). Object Lock also supports Legal Hold, which prevents deletion without a retention
      period. Object Lock must be enabled at bucket creation. Available for S3 Versioning-
      enabled buckets.
    source_refs:
      - "AmazonS3/latest/userguide/object-lock.html"
    required_entities:
      - "Object Lock"
      - "WORM"
      - "Governance mode"
      - "Compliance mode"
  constraints:
    must_mention:
      - "WORM"
      - "Compliance mode"
    must_not_claim:
      - "root account can delete in Compliance mode"
      - "no retention period required"
    max_tokens: 200

- id: "storage-t1-012"
  tier: 1
  type: factoid
  hops: 1
  question: "What is S3 Versioning and how does it interact with S3 Lifecycle policies?"
  ground_truth:
    answer: >
      S3 Versioning keeps multiple variants of an object in the same bucket, preserving,
      retrieving, and restoring every version. When enabled, every PUT creates a new version
      with a unique version ID; DELETE adds a delete marker (does not actually remove versions).
      To fully delete all versions, you must explicitly delete each version ID. S3 Lifecycle
      policies can manage versions: NoncurrentVersionExpiration action permanently deletes
      older versions after N days; NoncurrentVersionTransition moves older versions to cheaper
      storage classes (e.g., Standard-IA, Glacier). Versioning is a prerequisite for S3
      Object Lock and for S3 Replication. Once enabled, versioning can be suspended but not
      disabled.
    source_refs:
      - "AmazonS3/latest/userguide/Versioning.html"
      - "AmazonS3/latest/userguide/lifecycle-configuration-examples.html"
    required_entities:
      - "S3 Versioning"
      - "delete marker"
      - "NoncurrentVersionExpiration"
  constraints:
    must_mention:
      - "delete marker"
      - "version ID"
    must_not_claim:
      - "DELETE permanently removes all versions"
      - "versioning can be fully disabled once enabled"
    max_tokens: 200

- id: "storage-t1-013"
  tier: 1
  type: factoid
  hops: 1
  question: >
    What are S3 server-side encryption options and how do they differ?
  ground_truth:
    answer: >
      S3 supports three server-side encryption options: SSE-S3 (S3-managed keys, AES-256,
      AWS manages key rotation, no additional cost), SSE-KMS (AWS KMS-managed keys, supports
      customer-managed CMKs, enables key usage audit trails via CloudTrail, per-request KMS
      charges apply, allows BYOK), and SSE-C (customer-provided keys, customer manages and
      supplies key with each request, S3 does not store the key, customer responsible for
      key rotation). As of January 2023, all new S3 objects are encrypted by default with
      SSE-S3. DSSE-KMS (dual-layer SSE-KMS) applies two layers of encryption for regulatory
      requirements. Client-side encryption is also possible before uploading.
    source_refs:
      - "AmazonS3/latest/userguide/serv-side-encryption.html"
    required_entities:
      - "SSE-S3"
      - "SSE-KMS"
      - "SSE-C"
  constraints:
    must_mention:
      - "SSE-KMS"
      - "SSE-S3"
    must_not_claim:
      - "S3 does not encrypt by default"
      - "SSE-C stores keys in AWS"
    max_tokens: 200

- id: "storage-t1-014"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the maximum object size in S3 and how does multipart upload work?"
  ground_truth:
    answer: >
      The maximum S3 object size is 5 TB. Individual PUT operations are limited to 5 GB.
      For objects larger than 100 MB, AWS recommends multipart upload. Multipart upload
      splits the object into parts (minimum part size: 5 MB, except the last part; maximum
      10,000 parts), uploads each part independently and in parallel, then sends a
      CompleteMultipartUpload request. Benefits: improved throughput via parallel uploads,
      resilience (only failed parts need to be re-uploaded, not the entire object), and the
      ability to begin uploading before the total object size is known. Incomplete multipart
      uploads must be cleaned up via lifecycle policy (AbortIncompleteMultipartUpload action)
      to avoid storage charges.
    source_refs:
      - "AmazonS3/latest/userguide/mpuoverview.html"
    required_entities:
      - "multipart upload"
      - "5 TB"
      - "10,000 parts"
  constraints:
    must_mention:
      - "5 TB"
      - "multipart upload"
    must_not_claim:
      - "maximum object size is 5 GB"
      - "no parallel uploads"
    max_tokens: 200

- id: "storage-t1-015"
  tier: 1
  type: factoid
  hops: 1
  question: "What is EBS Multi-Attach and which volume types support it?"
  ground_truth:
    answer: >
      EBS Multi-Attach enables a single Provisioned IOPS SSD (io1 or io2) volume to be
      attached to multiple EC2 instances simultaneously within the same Availability Zone.
      Up to 16 instances can be attached to a single Multi-Attach enabled volume. Use cases
      include clustered Linux applications that manage concurrent write operations (such as
      Teradata), applications that require high availability via shared storage. The attached
      instances must use a cluster-aware file system (e.g., GFS2) or application-level locking
      — standard file systems like ext4 or XFS do not support concurrent multi-instance writes
      safely. Multi-Attach is supported in select AWS Regions and only for Linux instances
      (not Windows).
    source_refs:
      - "ec2/latest/userguide/ebs-volumes-multi.html"
    required_entities:
      - "EBS Multi-Attach"
      - "io1"
      - "io2"
  constraints:
    must_mention:
      - "same Availability Zone"
      - "io1"
    must_not_claim:
      - "supported by gp3"
      - "cross-AZ attachment"
    max_tokens: 200

- id: "storage-t1-016"
  tier: 1
  type: factoid
  hops: 1
  question: "What is S3 Transfer Acceleration and when should you use it?"
  ground_truth:
    answer: >
      S3 Transfer Acceleration uses CloudFront edge locations to accelerate uploads and
      downloads for Amazon S3 buckets. When uploading, data routes to the nearest CloudFront
      edge location over the public internet, then travels the optimized AWS backbone network
      to the S3 bucket's region. This reduces latency for geographically dispersed clients
      uploading large objects. Transfer Acceleration adds an additional per-GB charge on top
      of standard S3 transfer costs; AWS will not charge if Transfer Acceleration does not
      improve speed versus a standard upload. Use when: users are geographically distributed
      globally, uploading large files (>1 GB) over long distances, or existing bandwidth
      utilization is high. Not suitable for same-region transfers.
    source_refs:
      - "AmazonS3/latest/userguide/transfer-acceleration.html"
    required_entities:
      - "Transfer Acceleration"
      - "CloudFront edge locations"
      - "AWS backbone"
  constraints:
    must_mention:
      - "edge location"
      - "large files"
    must_not_claim:
      - "same as CloudFront distribution"
      - "always faster than direct upload"
    max_tokens: 200

- id: "storage-t1-017"
  tier: 1
  type: factoid
  hops: 1
  question: "What is Amazon S3 Replication and what types does it support?"
  ground_truth:
    answer: >
      S3 Replication asynchronously copies objects from a source bucket to one or more
      destination buckets. Two types: Cross-Region Replication (CRR) copies objects to a
      bucket in a different AWS Region (use cases: compliance, latency reduction for global
      users, disaster recovery) and Same-Region Replication (SRR) copies objects within
      the same Region (use cases: log aggregation, compliance, maintaining copies across
      accounts). Both require S3 Versioning enabled on source and destination buckets.
      Replication rules specify filters (prefix or tag), destination bucket, storage class,
      and IAM role. Existing objects are not replicated automatically; S3 Batch Replication
      handles existing objects. Delete markers are not replicated by default (optional).
    source_refs:
      - "AmazonS3/latest/userguide/replication.html"
    required_entities:
      - "S3 Replication"
      - "Cross-Region Replication"
      - "Same-Region Replication"
  constraints:
    must_mention:
      - "Cross-Region Replication"
      - "Versioning"
    must_not_claim:
      - "synchronous replication"
      - "existing objects replicated automatically"
    max_tokens: 200
