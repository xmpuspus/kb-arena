      - "logical directory"
      - "IAM role"
    must_not_claim:
      - "users can access all S3 buckets"
      - "no SSH key support"
    max_tokens: 200

- id: "storage-t2-014"
  tier: 2
  type: procedural
  hops: 2
  question: >
    How do you configure S3 Intelligent-Tiering to automatically move objects to
    archive tiers and what monitoring cost applies?
  ground_truth:
    answer: >
      S3 Intelligent-Tiering setup: (1) Upload objects directly to S3 Intelligent-Tiering
      storage class, or create a Lifecycle rule to transition objects from Standard to
      Intelligent-Tiering after N days. (2) S3 automatically monitors access patterns per
      object at no additional storage cost charge per GET/PUT (monitoring fee applies for
      objects >= 128 KB: $0.0025 per 1,000 objects/month). (3) Objects not accessed for
      30 days move to Infrequent Access tier; not accessed for 90 days move to Archive
      Instant Access tier (millisecond retrieval). (4) To enable the optional deep archive
      tiers, configure the Intelligent-Tiering Archive configuration on the bucket — objects
      not accessed for 90 days move to Archive Access, 180 days to Deep Archive Access
      (3-5 hour and 12-hour retrieval respectively). (5) Accessing an object from any tier
      automatically moves it back to Frequent Access with no retrieval charge.
    source_refs:
      - "AmazonS3/latest/userguide/intelligent-tiering-overview.html"
    required_entities:
      - "S3 Intelligent-Tiering"
      - "Frequent Access"
      - "Infrequent Access"
      - "Archive Access"
  constraints:
    must_mention:
      - "30 days"
      - "monitoring fee"
    must_not_claim:
      - "no monitoring charge"
      - "manual tier selection required"
    max_tokens: 200

- id: "storage-t2-015"
  tier: 2
  type: procedural
  hops: 1
  question: "How do you encrypt an existing unencrypted EBS volume?"
  ground_truth:
    answer: >
      EBS does not support in-place encryption of an existing unencrypted volume. Steps to
      encrypt: (1) Create a snapshot of the unencrypted volume: EC2 console > Volumes >
      Actions > Create Snapshot. (2) Copy the snapshot with encryption enabled: Snapshots >
      Actions > Copy Snapshot, check Encrypt this snapshot, and select a KMS key (AWS
      managed key or customer CMK). This creates an encrypted copy of the snapshot. (3)
      Create a new EBS volume from the encrypted snapshot: Snapshots > Actions > Create
      Volume. The new volume is encrypted. (4) Detach the original unencrypted volume from
      the EC2 instance. (5) Attach the new encrypted volume to the instance at the same
      device name (e.g., /dev/xvda for root). (6) Start the instance and verify it boots.
      (7) Delete the unencrypted volume and original snapshot when confirmed. To enable
      encryption by default for all new EBS volumes in a region, enable EBS encryption by
      default in EC2 settings.
    source_refs:
      - "ec2/latest/userguide/EBSEncryption.html"
    required_entities:
      - "EBS encryption"
      - "snapshot copy"
      - "KMS key"
  constraints:
    must_mention:
      - "snapshot"
      - "KMS"
    must_not_claim:
      - "can encrypt existing volume in-place"
      - "no KMS key required"
    max_tokens: 200

- id: "storage-t2-016"
  tier: 2
  type: procedural
  hops: 2
  question: >
    How do you order and use an AWS Snowball Edge Storage Optimized device for
    a large data migration to S3?
  ground_truth:
    answer: >
      Snowball Edge Storage Optimized migration steps: (1) In the AWS Snow Family console,
      create a job: choose Import into Amazon S3, select Snowball Edge Storage Optimized
      (80 TB usable), specify target S3 bucket, IAM role, KMS key for data-at-rest
      encryption, and shipping address. (2) AWS ships the device to your location (2-5
      business days typically). (3) Connect the device to your network, power on, and unlock
      using the Snowball Edge client with credentials from the console. (4) Use the Snowball
      Edge client (`snowballEdge`) or AWS OpsHub GUI to list and copy data: run
      `aws s3 cp --endpoint http://<device-ip>:8080` or use the Snowball Edge S3 adapter.
      (5) Ship the device back to AWS. AWS ingests the data to S3 (typically 1-5 days after
      receipt). Data is erased from the device per NIST 800-88 after ingestion. Monitor
      import status in the console.
    source_refs:
      - "snowball/latest/ug/getting-started-transfer-data-client.html"
    required_entities:
