- id: "storage-t2-017"
  tier: 2
  type: procedural
  hops: 2
  question: "How do you configure S3 Object Lock to meet SEC 17a-4 compliance requirements?"
  ground_truth:
    answer: >
      S3 Object Lock for SEC 17a-4 compliance: (1) Create a new S3 bucket with Object Lock
      enabled (cannot be added to an existing bucket); also enable Versioning (required by
      Object Lock). (2) Set a default retention period in Compliance mode on the bucket:
      in bucket Properties > Object Lock, configure default retention of Compliance mode
      with retention period matching regulatory requirements (e.g., 6 years for SEC 17a-4).
      (3) Upload objects — S3 applies the retention period automatically based on the bucket
      default. (4) Confirm no user (including root) can delete objects during the retention
      period. (5) Optionally apply Legal Hold to individual objects for additional protection
      during legal proceedings. (6) Validate by obtaining Cohasset Associates assessment
      (AWS has published assessments confirming S3 Object Lock Compliance mode meets SEC
      17a-4). Use S3 Glacier Flexible Retrieval or Deep Archive storage class for cost
      efficiency on archived records, in combination with Object Lock.
    source_refs:
      - "AmazonS3/latest/userguide/object-lock.html"
      - "AmazonS3/latest/userguide/object-lock-overview.html"
    required_entities:
      - "Object Lock"
      - "Compliance mode"
      - "SEC 17a-4"
      - "Legal Hold"
  constraints:
    must_mention:
      - "Compliance mode"
      - "retention period"
    must_not_claim:
      - "Governance mode meets SEC 17a-4"
      - "Object Lock can be added to existing bucket"
    max_tokens: 200
