      - "EDGAR Next"
      - "Login.gov"
      - "CCC"
    must_not_claim:
      - "EDGAR Next changed what filings are required"
      - "CIK numbers changed under EDGAR Next"

- id: "sec-t5-010"
  tier: 5
  type: temporal
  hops: 4
  question: "How did SEC requirements for climate-related disclosure evolve from the 2010 guidance through the 2024 final rules, and what is the current status?"
  ground_truth:
    answer: "In February 2010, the SEC issued interpretive guidance (Release No. 33-9106) clarifying that existing disclosure requirements (Reg S-K risk factors, MD&A, business description) could require climate-related disclosures under existing materiality standards — no new rules were created. In March 2022, the SEC proposed comprehensive new climate disclosure rules. In March 2024, the SEC adopted final climate disclosure rules (Release No. 33-11275) requiring large accelerated filers to disclose Scope 1 and Scope 2 greenhouse gas emissions, material climate-related risks, governance, and strategy in annual reports. Scope 3 emissions disclosure, which was proposed, was dropped from the final rules. However, following legal challenges and a voluntary stay issued by the SEC in April 2024, the rules were not implemented and the SEC announced in February 2025 that it would not defend the rules and would repeal them."
    source_refs:
      - "SEC Release No. 33-9106 (2010 guidance)"
      - "SEC Release No. 33-11275 (2024 final rules)"
    required_entities:
