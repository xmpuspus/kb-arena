      - "climate rules are fully in effect as of 2025"

- id: "sec-t5-011"
  tier: 5
  type: temporal
  hops: 3
  question: "How did the threshold and filing requirements for Schedule 13G short-form beneficial ownership reports change under the SEC's October 2023 amendments?"
  ground_truth:
    answer: "Before October 2023, qualified institutional investors had 45 days after calendar year end to file initial Schedule 13G reports. The SEC's October 2023 amendments (Release No. 34-98704, effective February 5, 2024) accelerated these deadlines significantly: for qualified institutional investors, the initial Schedule 13G deadline changed from 45 days after year end to 45 days after the calendar quarter in which the 5% threshold was crossed. For passive investors (Rule 13d-1(c)), initial filing was shortened from 10 calendar days to 5 business days after crossing 5%. Amendment deadlines for material changes were similarly tightened — from promptly (interpreted as within 10 days of month end) to 5 business days after the triggering event. The amendments also shortened Schedule 13D initial filing deadlines from 10 calendar days to 5 business days after crossing 5%. These were the most significant changes to Section 13 reporting since 1977."
    source_refs:
      - "SEC Release No. 34-98704 (October 2023)"
      - "17 CFR 240.13d-1 (as amended 2024)"
    required_entities:
      - "Schedule 13G"
      - "Schedule 13D"
      - "2023 amendments"
      - "5 business days"
      - "45 days after calendar quarter"
  constraints:
    must_mention:
      - "5 business days"
      - "2023"
      - "calendar quarter"
    must_not_claim:
      - "13G deadlines were unchanged since 1977"
      - "new deadlines took effect in 2023"

- id: "sec-t5-012"
  tier: 5
  type: temporal
  hops: 5
  question: "What was the sequence of regulatory changes to SEC Form 10-K's risk factor disclosure requirements from the 2005 plain English initiative through the 2020 amendments?"
  ground_truth:
    answer: "The evolution of risk factor disclosure in Form 10-K: (1) Before 2005, Regulation S-K Item 503(c) required risk factors in prospectuses but not specifically in annual reports — companies included them voluntarily or under general materiality principles. (2) The 2005 SEC plain English initiative (Release No. 33-8591) and related guidance encouraged clearer risk factor disclosures but did not mandate annual report risk factors by rule. (3) In practice, companies began routinely including risk factors in 10-K filings under Item 1A (added formally to Form 10-K in 2005), with the SEC clarifying in the same release that Item 1A required disclosure of material risk factors specific to the company and the risks of investing in its securities. (4) In November 2020, the SEC adopted amendments to Regulation S-K (Release No. 33-10825) redesignating risk factors from Item 503(c) to new Item 105, requiring companies with risk factor sections exceeding 15 pages to add a summary section of no more than two pages at the beginning, and clarifying that boilerplate and generic risk factors are insufficient. The 2020 amendments took effect for filings on or after February 10, 2021."
    source_refs:
      - "SEC Release No. 33-8591 (2005)"
      - "Regulation S-K Item 1A (Form 10-K)"
      - "SEC Release No. 33-10825 (November 2020)"
      - "Regulation S-K Item 105"
    required_entities:
      - "Item 1A"
      - "Item 105"
      - "Item 503(c)"
      - "2005"
      - "2020"
      - "summary section"
      - "15 pages"
  constraints:
