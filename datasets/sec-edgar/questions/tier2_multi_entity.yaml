- id: "sec-t2-001"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What are the filing deadlines for Form 10-K across all three accelerated filer categories?"
  ground_truth:
    answer: "The three accelerated filer categories have different 10-K deadlines: large accelerated filers (public float $700M+) must file within 60 days of fiscal year end; accelerated filers (public float $75M to $699.9M) must file within 75 days; non-accelerated filers must file within 90 days. These deadlines were established under SEC Release No. 33-8128."
    source_refs:
      - "17 CFR 240.12b-2"
      - "17 CFR 240.13a-1"
    required_entities:
      - "large accelerated filer"
      - "accelerated filer"
      - "non-accelerated filer"
      - "60 days"
      - "75 days"
      - "90 days"
  constraints:
    must_mention:
      - "60 days"
      - "75 days"
      - "90 days"
    must_not_claim:
      - "all filers have the same deadline"
      - "45 days"

- id: "sec-t2-002"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What must both a Schedule 13D filer and a Schedule 13G filer disclose about their beneficial ownership position?"
  ground_truth:
    answer: "Both Schedule 13D and Schedule 13G require disclosure of the name and address of the reporting person, the class and amount of securities beneficially owned, the percentage of the class owned, and whether the person has sole or shared voting and dispositive power. However, Schedule 13D also requires disclosure of the purpose of the acquisition, the source and amount of funds, and any plans to change the issuer's business or structure — disclosures not required on Schedule 13G."
    source_refs:
      - "17 CFR 240.13d-1"
      - "17 CFR 240.13d-2"
    required_entities:
      - "Schedule 13D"
      - "Schedule 13G"
      - "beneficial ownership"
      - "voting power"
      - "dispositive power"
  constraints:
    must_mention:
      - "beneficial ownership"
      - "voting power"
    must_not_claim:
      - "identical disclosures"
      - "Schedule 13G requires purpose of acquisition"

- id: "sec-t2-003"
  tier: 2
  type: multi_entity
  hops: 2
  question: "Which SEC forms are used to report initial, ongoing, and year-end insider ownership under Section 16?"
  ground_truth:
    answer: "Section 16 requires three forms: Form 3 reports initial beneficial ownership when a person first becomes a Section 16 insider (director, officer, or 10% holder) and must be filed within 10 days. Form 4 reports changes in ownership from transactions and must be filed within two business days. Form 5 is an annual report due within 45 days after fiscal year end that discloses transactions exempt from Form 4 reporting that were not previously reported."
    source_refs:
      - "Section 16 of the Securities Exchange Act of 1934"
      - "17 CFR 240.16a-3"
    required_entities:
      - "Form 3"
      - "Form 4"
      - "Form 5"
      - "Section 16"
  constraints:
    must_mention:
      - "Form 3"
      - "Form 4"
      - "Form 5"
    must_not_claim:
      - "Form 4 is annual"
      - "Form 3 reports changes"

- id: "sec-t2-004"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What information must appear in both a Form S-1 and a Form 10-K under Regulation S-K Item 503?"
  ground_truth:
    answer: "Regulation S-K Item 105 (formerly Item 503) requires risk factor disclosure in both Form S-1 registration statements and Form 10-K annual reports. Both must include a discussion of the most significant factors that make an investment in the registrant speculative or risky. The risk factors must be specific to the company and offering, organized under relevant headings, and not boilerplate. The 2020 amendment added a requirement for a summary risk factor section if the full section exceeds 15 pages."
    source_refs:
      - "17 CFR 229.105"
      - "SEC Release No. 33-10825"
    required_entities:
      - "Form S-1"
      - "Form 10-K"
      - "Regulation S-K Item 105"
      - "risk factors"
  constraints:
    must_mention:
      - "risk factors"
      - "Regulation S-K"
    must_not_claim:
      - "Item 503"
      - "optional for smaller companies"

- id: "sec-t2-005"
  tier: 2
  type: multi_entity
  hops: 2
  question: "How do the financial statement audit requirements differ between a Form 10-K and a Form 10-Q?"
  ground_truth:
    answer: "Form 10-K requires audited annual financial statements — the balance sheet, income statement, statement of cash flows, and statement of stockholders' equity must be examined by an independent registered public accounting firm (PCAOB-registered auditor) and accompanied by an audit opinion. Form 10-Q requires only unaudited condensed interim financial statements reviewed (not audited) by the independent auditor under AU-C Section 930. The auditor provides a review report, not an audit opinion, for 10-Q filings."
    source_refs:
      - "17 CFR 210.3-01 through 210.3-04"
      - "17 CFR 210.10-01"
    required_entities:
      - "Form 10-K"
      - "Form 10-Q"
      - "audited"
      - "unaudited"
      - "PCAOB"
  constraints:
    must_mention:
      - "audited"
      - "unaudited"
      - "review"
    must_not_claim:
      - "Form 10-Q is audited"
      - "no auditor involvement in 10-Q"

- id: "sec-t2-006"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What disclosures are required in both a proxy statement (DEF 14A) and a Form 10-K regarding executive compensation?"
  ground_truth:
    answer: "Both DEF 14A and Form 10-K require executive compensation disclosure under Regulation S-K Items 402 and 403. Required in both: Summary Compensation Table showing total compensation for named executive officers (NEOs), the Compensation Discussion and Analysis (CD&A) narrative, and Outstanding Equity Awards at Fiscal Year-End table. The DEF 14A additionally includes the say-on-pay advisory vote proposal and compensation committee report. Form 10-K incorporates proxy compensation disclosures by reference if the proxy is filed within 120 days of fiscal year end."
    source_refs:
      - "17 CFR 229.402"
      - "17 CFR 229.403"
    required_entities:
      - "DEF 14A"
      - "Form 10-K"
      - "Summary Compensation Table"
      - "Compensation Discussion and Analysis"
      - "named executive officers"
  constraints:
    must_mention:
      - "Summary Compensation Table"
      - "named executive officers"
    must_not_claim:
      - "compensation only in proxy"
      - "CD&A optional for non-accelerated filers"

- id: "sec-t2-007"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What items must be disclosed in an 8-K regarding both a material definitive agreement and a departure of a principal officer?"
  ground_truth:
    answer: "For a material definitive agreement (Item 1.01), an 8-K must describe the parties, date, and material terms of the agreement, and must file the agreement as an exhibit. For departure of a director or principal officer (Item 5.02), the filing must disclose the date of departure, the position held, and whether the departure was voluntary or involved a disagreement with the company — if a disagreement, it must be described. Both items trigger the four-business-day filing deadline."
    source_refs:
      - "17 CFR 249.308 Items 1.01 and 5.02"
      - "SEC Release No. 33-8400"
    required_entities:
      - "Item 1.01"
      - "Item 5.02"
      - "Form 8-K"
      - "material definitive agreement"
      - "principal officer"
  constraints:
    must_mention:
      - "four business days"
      - "exhibit"
    must_not_claim:
      - "agreement terms are confidential and need not be disclosed"
      - "voluntary departure requires no 8-K"

- id: "sec-t2-008"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What are the key differences in who must file Schedule 13D versus Schedule 13G for a 5% beneficial ownership position?"
  ground_truth:
    answer: "Schedule 13G is available as a short-form alternative to Schedule 13D only for certain passive investors: qualified institutional investors (banks, insurance companies, registered investment advisers) that acquired shares in the ordinary course of business without the purpose of influencing control; exempt investors who held their position before the issuer registered its shares; and passive investors who own less than 20% and did not acquire shares with the intent to influence control. Any investor who acquires more than 5% with the purpose of influencing control must file the long-form Schedule 13D."
    source_refs:
      - "17 CFR 240.13d-1(b)"
      - "17 CFR 240.13d-1(c)"
    required_entities:
      - "Schedule 13D"
      - "Schedule 13G"
      - "qualified institutional investor"
      - "passive investor"
  constraints:
    must_mention:
      - "passive"
      - "influence control"
    must_not_claim:
      - "any investor can choose 13G"
      - "13G requires the same information as 13D"

- id: "sec-t2-009"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What MD&A disclosures are required in both Form 10-K and Form 10-Q under Regulation S-K?"
  ground_truth:
    answer: "Regulation S-K Item 303 requires MD&A in both Form 10-K and Form 10-Q. Both require discussion of liquidity and capital resources, results of operations comparing current to prior periods, and known trends or uncertainties that could materially affect future results. Form 10-K MD&A must cover three fiscal years and include critical accounting estimates. Form 10-Q MD&A covers the current quarter and year-to-date, compares to the same periods of the prior year, and focuses on material changes since the most recent 10-K."
    source_refs:
      - "17 CFR 229.303"
      - "SEC Release No. 33-10890"
    required_entities:
      - "Form 10-K"
      - "Form 10-Q"
      - "Regulation S-K Item 303"
      - "MD&A"
  constraints:
    must_mention:
      - "liquidity"
      - "results of operations"
    must_not_claim:
      - "MD&A only required in 10-K"
      - "three years required in 10-Q"

- id: "sec-t2-010"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What EDGAR filing requirements apply to both domestic and foreign private issuers registering securities for an IPO?"
  ground_truth:
    answer: "Domestic companies register IPO securities on Form S-1 under the Securities Act of 1933, providing US GAAP financial statements audited under PCAOB standards. Foreign private issuers use Form F-1 and may provide financial statements under IFRS as issued by the IASB without reconciliation to US GAAP. Both forms require a prospectus with a business description, risk factors, use of proceeds, and management discussion. Both are subject to SEC review before effectiveness and must be filed through EDGAR."
    source_refs:
      - "17 CFR 239.11 (Form S-1)"
      - "17 CFR 239.31 (Form F-1)"
    required_entities:
      - "Form S-1"
      - "Form F-1"
      - "foreign private issuer"
      - "IFRS"
      - "US GAAP"
  constraints:
    must_mention:
      - "Form F-1"
      - "foreign private issuer"
    must_not_claim:
      - "foreign issuers must use US GAAP"
      - "F-1 and S-1 are identical"

- id: "sec-t2-011"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What are the EDGAR submission requirements for both the annual report on Form 10-K and the XBRL interactive data?"
  ground_truth:
    answer: "Form 10-K must be submitted electronically through EDGAR in HTML or ASCII format. Since 2019, large accelerated filers, and since 2020, all filers, must also submit financial statements using Inline XBRL (iXBRL) embedded in the HTML document under Rule 405 of Regulation S-T. The iXBRL-tagged financial statements are part of the main 10-K document — not a separate exhibit — and must use tags from the current US GAAP or IFRS XBRL taxonomy published by FASB."
    source_refs:
      - "17 CFR 232.405"
      - "SEC Release No. 33-10514"
    required_entities:
      - "Form 10-K"
      - "Inline XBRL"
      - "iXBRL"
      - "Rule 405"
      - "Regulation S-T"
  constraints:
    must_mention:
      - "Inline XBRL"
      - "HTML"
    must_not_claim:
      - "XBRL submitted as separate file"
      - "XBRL optional for large filers"

- id: "sec-t2-012"
  tier: 2
  type: multi_entity
  hops: 2
  question: "What compensation information must be disclosed in both Form 4 filings and in the Summary Compensation Table of a proxy statement?"
  ground_truth:
    answer: "Form 4 discloses individual transactions — the specific security, transaction date, transaction code (purchase, sale, award, etc.), shares transacted, price per share, and resulting ownership position. The proxy Summary Compensation Table discloses total annual compensation in aggregated categories (salary, bonus, stock awards, option awards, non-equity incentive plan compensation, change in pension value, and all other compensation) for each named executive officer. Form 4 is transaction-level and real-time (filed within two business days); the Summary Compensation Table is annual and covers the most recent three fiscal years."
    source_refs:
      - "17 CFR 240.16a-3"
      - "17 CFR 229.402(c)"
    required_entities:
      - "Form 4"
      - "Summary Compensation Table"
      - "named executive officers"
      - "transaction"
  constraints:
    must_mention:
      - "transaction"
      - "named executive officers"
    must_not_claim:
      - "Form 4 and SCT disclose identical information"
      - "Form 4 covers all employees"
