- id: "sec-t3-001"
  tier: 3
  type: comparison
  hops: 2
  question: "How does the disclosure standard under Regulation S-K differ from the disclosure standard under Regulation S-X?"
  ground_truth:
    answer: "Regulation S-K governs non-financial statement disclosures in SEC filings — it specifies required narrative content such as business description, risk factors, MD&A, properties, legal proceedings, executive compensation, and corporate governance. Regulation S-X governs the form and content of financial statements themselves, including which statements must be included, accounting periods covered, the form of auditor reports, and specific line-item requirements for balance sheets and income statements. S-K addresses what companies say about their business; S-X addresses how they present their numbers."
    source_refs:
      - "17 CFR Part 229 (Regulation S-K)"
      - "17 CFR Part 210 (Regulation S-X)"
    required_entities:
      - "Regulation S-K"
      - "Regulation S-X"
      - "financial statements"
      - "non-financial disclosures"
  constraints:
    must_mention:
      - "Regulation S-K"
      - "Regulation S-X"
      - "financial statements"
    must_not_claim:
      - "S-K and S-X cover the same topics"
      - "S-X governs executive compensation"

- id: "sec-t3-002"
  tier: 3
  type: comparison
  hops: 2
  question: "How does an accelerated filer's 10-K filing deadline differ from a non-accelerated filer's, and what criteria determine which category applies?"
  ground_truth:
    answer: "Large accelerated filers (public float $700M+) must file Form 10-K within 60 days of fiscal year end. Accelerated filers (public float $75M–$699.9M, subject to having filed at least one annual report and being Exchange Act reporting for at least 12 months) must file within 75 days. Non-accelerated filers (public float below $75M, or new reporting companies) have 90 days. The public float is measured as of the last business day of the company's most recently completed second fiscal quarter."
    source_refs:
      - "17 CFR 240.12b-2"
      - "17 CFR 240.13a-1"
    required_entities:
      - "large accelerated filer"
      - "accelerated filer"
      - "non-accelerated filer"
      - "$700 million"
      - "$75 million"
  constraints:
    must_mention:
      - "public float"
      - "second fiscal quarter"
    must_not_claim:
      - "revenue determines filer category"
      - "market cap determines filer category"

- id: "sec-t3-003"
  tier: 3
  type: comparison
  hops: 2
  question: "How does a Rule 506(b) offering differ from a Rule 506(c) offering under Regulation D?"
  ground_truth:
    answer: "Rule 506(b) prohibits general solicitation and advertising but allows sales to up to 35 non-accredited sophisticated investors plus unlimited accredited investors; issuers must provide non-accredited investors with specific disclosure documents similar to registered offering requirements. Rule 506(c) explicitly permits general solicitation and general advertising but restricts all purchasers to accredited investors only, and issuers must take reasonable steps to verify accredited investor status — self-certification alone is insufficient. Both rules preempt state securities law registration requirements (except notice filings)."
    source_refs:
      - "17 CFR 230.506(b)"
      - "17 CFR 230.506(c)"
    required_entities:
      - "Rule 506(b)"
      - "Rule 506(c)"
      - "general solicitation"
      - "accredited investors"
      - "non-accredited investors"
  constraints:
    must_mention:
      - "general solicitation"
      - "accredited investors"
      - "verification"
    must_not_claim:
      - "506(b) allows general solicitation"
      - "506(c) allows non-accredited investors"

- id: "sec-t3-004"
  tier: 3
  type: comparison
  hops: 3
  question: "How do the EDGAR filing obligations of a foreign private issuer differ from those of a domestic reporting company for annual and current reporting?"
  ground_truth:
    answer: "A domestic company files Form 10-K annually (due 60–90 days after fiscal year end depending on filer category) and Form 8-K for material current events within four business days. A foreign private issuer files Form 20-F annually (due within four months of fiscal year end) and Form 6-K for material information distributed in its home country or required by a foreign stock exchange — there is no fixed deadline for 6-K, it is submitted promptly when the information is made public. Foreign private issuers may use IFRS without US GAAP reconciliation in their 20-F. Foreign private issuers are exempt from Regulation FD and the SEC's proxy rules."
    source_refs:
      - "17 CFR 249.220f (Form 20-F)"
      - "17 CFR 249.306 (Form 6-K)"
      - "17 CFR 240.3b-4 (foreign private issuer definition)"
    required_entities:
      - "Form 20-F"
      - "Form 6-K"
      - "foreign private issuer"
      - "Form 10-K"
      - "Form 8-K"
  constraints:
    must_mention:
      - "Form 20-F"
      - "Form 6-K"
      - "Regulation FD"
    must_not_claim:
      - "foreign private issuers file Form 10-K"
      - "foreign issuers must use US GAAP"

- id: "sec-t3-005"
  tier: 3
  type: comparison
  hops: 2
  question: "How does the content required in a Form S-1 differ from the content required in a Form S-3 shelf registration statement?"
  ground_truth:
    answer: "Form S-1 is used by companies registering securities for the first time or those ineligible for S-3; it requires full disclosure including a complete business description, audited financial statements, risk factors, and MD&A directly in the filing. Form S-3 is a short-form registration available only to seasoned issuers (Exchange Act reporting for at least 12 months, timely filings, and either $75M+ public float for primary offerings or meeting transaction-type eligibility); it incorporates by reference the issuer's existing Exchange Act filings, so the S-3 itself contains only the specific offering terms. S-3 enables shelf registration for future offerings."
    source_refs:
      - "17 CFR 239.11 (Form S-1)"
      - "17 CFR 239.13 (Form S-3)"
    required_entities:
      - "Form S-1"
      - "Form S-3"
      - "shelf registration"
      - "incorporation by reference"
  constraints:
    must_mention:
      - "incorporation by reference"
      - "shelf registration"
    must_not_claim:
      - "any company can use Form S-3"
      - "S-3 requires full financial statement disclosure"

- id: "sec-t3-006"
  tier: 3
  type: comparison
  hops: 2
  question: "How does an emerging growth company's (EGC) SEC disclosure obligations differ from those of a large accelerated filer?"
  ground_truth:
    answer: "Emerging growth companies (EGCs), defined under the JOBS Act as companies with less than $1.235 billion in annual gross revenues in their most recent fiscal year that have not had their IPO before December 8, 2011, receive several accommodations: EGCs may omit the auditor attestation on internal controls under Sarbanes-Oxley Section 404(b); they may provide only two years of audited financial statements in S-1 instead of three; they are exempt from say-on-pay votes and new FASB accounting standards can be adopted on private company timelines. Large accelerated filers must comply with all of these requirements, including the Section 404(b) PCAOB audit of internal controls and three years of audited financials."
    source_refs:
      - "Section 2(a)(19) of the Securities Act of 1933 (JOBS Act)"
      - "Sarbanes-Oxley Act Section 404(b)"
    required_entities:
      - "emerging growth company"
      - "JOBS Act"
      - "Section 404(b)"
      - "large accelerated filer"
  constraints:
    must_mention:
      - "Section 404(b)"
      - "two years"
      - "JOBS Act"
    must_not_claim:
      - "EGCs are exempt from all SEC filing requirements"
      - "EGC status is permanent"

- id: "sec-t3-007"
  tier: 3
  type: comparison
  hops: 3
  question: "How does the EDGAR EDGAR full-text search system (efts.sec.gov) compare to the older EDGAR full-text search (EFTS legacy system) in terms of coverage and search capabilities?"
  ground_truth:
    answer: "The current EDGAR Full-Text Search at efts.sec.gov provides full-text search across all EDGAR filings from 1993 to the present, supporting keyword, phrase, and Boolean searches across the complete text of documents including exhibits. The legacy EDGAR full-text search (available via the EDGAR website and older API endpoints) had more limited coverage and was restricted to certain filing types. The current system is accessible via a REST API (https://efts.sec.gov/LATEST/search-index) that returns structured JSON results. EDGAR also separately provides the EDGAR Company Search for metadata-only searches by company name, CIK, filing type, and date range."
    source_refs:
      - "https://efts.sec.gov/LATEST/search-index"
      - "https://www.sec.gov/cgi-bin/browse-edgar"
    required_entities:
      - "efts.sec.gov"
      - "EDGAR Full-Text Search"
      - "CIK"
      - "REST API"
  constraints:
    must_mention:
      - "full text"
      - "exhibits"
    must_not_claim:
      - "EDGAR only searches filing headers"
      - "search limited to 5 years"

- id: "sec-t3-008"
  tier: 3
  type: comparison
  hops: 2
  question: "How does Regulation A+ differ from Regulation D in terms of investor eligibility and ongoing reporting obligations?"
  ground_truth:
    answer: "Regulation D (Rule 506) offerings are private placements that impose no ongoing SEC reporting obligations after the Form D notice filing, and under Rule 506(b) non-accredited investors may participate with disclosure requirements. Regulation A+ (Tier 1 up to $20M, Tier 2 up to $75M per year) permits sales to non-accredited investors without restriction and requires pre-qualification by the SEC through EDGAR. Tier 2 Regulation A+ issuers have ongoing reporting obligations (annual Form 1-K, semiannual Form 1-SA, and current reports on Form 1-U) similar to Exchange Act reporting, while Regulation D issuers generally have no ongoing reporting to the SEC."
    source_refs:
      - "17 CFR 230.251-230.263 (Regulation A)"
      - "17 CFR 230.500-230.508 (Regulation D)"
    required_entities:
      - "Regulation A+"
      - "Regulation D"
      - "Form 1-K"
      - "non-accredited investors"
      - "ongoing reporting"
  constraints:
    must_mention:
      - "ongoing reporting"
      - "non-accredited investors"
    must_not_claim:
      - "Regulation D requires ongoing SEC reporting"
      - "Regulation A+ is only for accredited investors"

- id: "sec-t3-009"
  tier: 3
  type: comparison
  hops: 2
  question: "How does the beneficial ownership reporting threshold and timeline differ between Schedule 13D and Schedule 13G for passive institutional investors?"
  ground_truth:
    answer: "Both Schedule 13D and Schedule 13G are triggered when beneficial ownership exceeds 5% of a registered class. For Schedule 13D, the filing must be made within 10 calendar days of crossing the 5% threshold. For qualified institutional investors filing Schedule 13G under Rule 13d-1(b), the initial filing is due within 45 days after the calendar year end in which the 5% threshold was crossed (not within 10 days of the transaction). However, if a qualified institutional investor's ownership exceeds 10%, a Schedule 13G must be filed within 10 calendar days. Passive investors under Rule 13d-1(c) must file Schedule 13G within 10 calendar days of crossing 5% but must own less than 20%."
    source_refs:
      - "17 CFR 240.13d-1(a) through (c)"
    required_entities:
      - "Schedule 13D"
      - "Schedule 13G"
      - "5%"
      - "10 calendar days"
      - "45 days"
      - "qualified institutional investor"
  constraints:
    must_mention:
      - "45 days"
      - "qualified institutional investor"
    must_not_claim:
      - "13G always due within 10 days"
      - "threshold is 10% for both forms"

- id: "sec-t3-010"
  tier: 3
  type: comparison
  hops: 2
  question: "How does the auditor's role differ in reviewing financial statements for a Form 10-Q versus auditing financial statements for a Form 10-K?"
  ground_truth:
    answer: "For Form 10-K, the independent registered public accounting firm performs a full audit under PCAOB standards (AS 2101 through AS 3105), providing positive assurance in the form of an audit opinion stating whether the financial statements present fairly in conformity with GAAP. For Form 10-Q, the auditor performs a review (not an audit) under PCAOB AS 4105, which consists principally of inquiries and analytical procedures; this provides negative assurance — the auditor states that nothing came to their attention indicating the statements are not in conformity with GAAP. A review is substantially less in scope than an audit."
    source_refs:
      - "PCAOB Auditing Standards AS 2101-AS 3105"
      - "PCAOB AS 4105"
    required_entities:
      - "Form 10-K"
      - "Form 10-Q"
      - "PCAOB"
      - "audit"
      - "review"
      - "negative assurance"
  constraints:
    must_mention:
      - "negative assurance"
      - "PCAOB"
      - "review"
    must_not_claim:
      - "Form 10-Q requires an audit opinion"
      - "no auditor involvement in 10-Q"

- id: "sec-t3-011"
  tier: 3
  type: comparison
  hops: 3
  question: "How do the disclosure requirements for related party transactions differ between Regulation S-K Item 404 and the financial statement requirements under ASC 850?"
  ground_truth:
    answer: "Regulation S-K Item 404 requires disclosure in proxy statements and annual reports of any transaction since the beginning of the company's last fiscal year where the amount exceeds $120,000 and in which a director, officer, 5%+ shareholder, or their immediate family member had a direct or indirect material interest. This is a narrative disclosure describing the parties, nature, and amount of each transaction. ASC 850 (Related Party Disclosures) requires financial statement footnote disclosure of the nature of the relationships, a description of the transactions, dollar amounts, and any amounts due to or from related parties — covering all material related party transactions regardless of the $120,000 threshold. S-K Item 404 applies to the management/governance section; ASC 850 applies to the audited financial statements."
    source_refs:
      - "17 CFR 229.404"
      - "ASC 850 (FASB Accounting Standards Codification)"
    required_entities:
      - "Regulation S-K Item 404"
      - "ASC 850"
      - "$120,000"
      - "related party transactions"
  constraints:
    must_mention:
      - "$120,000"
      - "financial statement footnote"
    must_not_claim:
      - "ASC 850 has a $120,000 threshold"
      - "Item 404 applies only to public companies with assets over $1 billion"

- id: "sec-t3-012"
  tier: 3
  type: comparison
  hops: 2
  question: "How does the SEC's treatment of non-GAAP financial measures differ between earnings releases filed as 8-K exhibits and non-GAAP measures in SEC registration statements?"
  ground_truth:
    answer: "In earnings releases furnished on Form 8-K Item 2.02, non-GAAP financial measures are subject to Regulation G — the release must include a reconciliation to the most directly comparable GAAP measure and a statement of why management believes the non-GAAP measure is useful to investors. In SEC registration statements and periodic reports (10-K, 10-Q), the same Regulation G requirements apply plus additional restrictions under SEC C&DI guidance: non-GAAP measures cannot be presented more prominently than GAAP measures, individually tailored accounting principles cannot be used, and non-GAAP measures cannot exclude charges that recur in normal business operations. The anti-fraud provisions of Regulation G apply to both."
    source_refs:
      - "17 CFR 244.100-244.102 (Regulation G)"
      - "SEC Compliance & Disclosure Interpretations on Non-GAAP Measures"
    required_entities:
      - "Regulation G"
      - "non-GAAP financial measures"
      - "Form 8-K"
      - "reconciliation"
  constraints:
    must_mention:
      - "reconciliation"
      - "Regulation G"
    must_not_claim:
      - "non-GAAP measures are prohibited in SEC filings"
      - "no reconciliation required for earnings releases"
