- id: "sec-t1-001"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the filing deadline for a large accelerated filer to submit its annual report on Form 10-K?"
  ground_truth:
    answer: "Large accelerated filers must file their Form 10-K within 60 days after the end of their fiscal year. This deadline applies to companies with a public float of $700 million or more."
    source_refs:
      - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=10-K"
      - "17 CFR 240.13a-1"
    required_entities:
      - "Form 10-K"
      - "large accelerated filer"
      - "60 days"
  constraints:
    must_mention:
      - "60 days"
      - "large accelerated filer"
    must_not_claim:
      - "75 days"
      - "90 days"
      - "45 days"

- id: "sec-t1-002"
  tier: 1
  type: factoid
  hops: 1
  question: "What form must corporate insiders file within two business days of a change in their beneficial ownership of company securities?"
  ground_truth:
    answer: "Corporate insiders must file Form 4 within two business days of a transaction that changes their beneficial ownership. Form 4 reports changes in beneficial ownership of registered equity securities by directors, officers, and 10% beneficial owners."
    source_refs:
      - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=4"
      - "Section 16(a) of the Securities Exchange Act of 1934"
    required_entities:
      - "Form 4"
      - "two business days"
      - "Section 16"
  constraints:
    must_mention:
      - "Form 4"
      - "two business days"
    must_not_claim:
      - "Form 3"
      - "Form 5"
      - "10 days"

- id: "sec-t1-003"
  tier: 1
  type: factoid
  hops: 1
  question: "What does the SEC's Regulation FD prohibit?"
  ground_truth:
    answer: "Regulation FD (Fair Disclosure) prohibits public companies from selectively disclosing material nonpublic information to certain market professionals or shareholders before making that information available to the general public. If selective disclosure occurs, the company must simultaneously or promptly make public disclosure of the same information."
    source_refs:
      - "17 CFR 243.100"
      - "https://www.sec.gov/rules/final/33-7881.htm"
    required_entities:
      - "Regulation FD"
      - "material nonpublic information"
      - "selective disclosure"
  constraints:
    must_mention:
      - "material nonpublic information"
      - "selective disclosure"
    must_not_claim:
      - "prohibits all analyst communications"
      - "applies only to officers"

- id: "sec-t1-004"
  tier: 1
  type: factoid
  hops: 1
  question: "What filing must a company submit to the SEC when it first becomes a reporting company through an initial public offering?"
  ground_truth:
    answer: "A company conducting an IPO registers its securities by filing a registration statement on Form S-1 (for domestic companies) under the Securities Act of 1933. The S-1 includes a prospectus with audited financial statements, risk factors, use of proceeds, and business description. The registration becomes effective after SEC review."
    source_refs:
      - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=S-1"
      - "Securities Act of 1933 Section 5"
    required_entities:
      - "Form S-1"
      - "Securities Act of 1933"
      - "registration statement"
  constraints:
    must_mention:
      - "Form S-1"
      - "registration statement"
    must_not_claim:
      - "Form 10-K"
      - "Form 8-K"
      - "automatically effective"

- id: "sec-t1-005"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the EDGAR full-text search system and what does it allow users to search?"
  ground_truth:
    answer: "EDGAR Full-Text Search (efts.sec.gov) allows users to search the complete text of all EDGAR filings, including exhibits. Users can search by keyword across millions of filings submitted since 1996. It supports Boolean operators and phrase searches within the filing text itself, not just filing metadata."
    source_refs:
      - "https://efts.sec.gov/LATEST/search-index?q=%22full-text+search%22"
      - "https://www.sec.gov/cgi-bin/srqsb"
    required_entities:
      - "EDGAR Full-Text Search"
      - "efts.sec.gov"
  constraints:
    must_mention:
      - "full text"
      - "filings"
    must_not_claim:
      - "only searches filing headers"
      - "limited to 10 years"

- id: "sec-t1-006"
  tier: 1
  type: factoid
  hops: 1
  question: "What is a DEF 14A filing and when must it be filed?"
  ground_truth:
    answer: "DEF 14A is a definitive proxy statement filed with the SEC. Companies must file it at least 40 calendar days before the shareholder meeting to which it relates. It discloses information about matters to be voted on at annual or special meetings, including director nominees, executive compensation, and shareholder proposals."
    source_refs:
      - "17 CFR 240.14a-6"
      - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=DEF+14A"
    required_entities:
      - "DEF 14A"
      - "proxy statement"
      - "40 days"
  constraints:
    must_mention:
      - "proxy statement"
      - "shareholder meeting"
    must_not_claim:
      - "30 days"
      - "60 days"
      - "annual report"

- id: "sec-t1-007"
  tier: 1
  type: factoid
  hops: 1
  question: "Under Schedule 13D, when must a beneficial owner report acquiring more than 5% of a class of registered equity securities?"
  ground_truth:
    answer: "A person who acquires beneficial ownership of more than 5% of a class of registered equity securities must file Schedule 13D within 10 calendar days after the acquisition. The filing must disclose the acquirer's identity, the purpose of the acquisition, the source of funds, and plans regarding the issuer."
    source_refs:
      - "Section 13(d) of the Securities Exchange Act of 1934"
      - "17 CFR 240.13d-1"
    required_entities:
      - "Schedule 13D"
      - "5%"
      - "10 calendar days"
  constraints:
    must_mention:
      - "5%"
      - "10 calendar days"
    must_not_claim:
      - "Schedule 13G"
      - "5 business days"
      - "30 days"

- id: "sec-t1-008"
  tier: 1
  type: factoid
  hops: 1
  question: "What financial statements are required in a Form 10-Q filing?"
  ground_truth:
    answer: "Form 10-Q requires condensed financial statements including a balance sheet (as of the end of the most recent fiscal quarter and as of the end of the preceding fiscal year), income statements for the three-month and year-to-date periods, a statement of cash flows for the year-to-date period, and a statement of stockholders' equity. These statements are unaudited but must comply with GAAP."
    source_refs:
      - "17 CFR 210.10-01"
      - "Regulation S-X Article 10"
    required_entities:
      - "Form 10-Q"
      - "condensed financial statements"
      - "Regulation S-X"
  constraints:
    must_mention:
      - "condensed"
      - "unaudited"
    must_not_claim:
      - "audited"
      - "full annual financial statements"

- id: "sec-t1-009"
  tier: 1
  type: factoid
  hops: 1
  question: "What is an 8-K filing used for?"
  ground_truth:
    answer: "Form 8-K is a current report used by public companies to disclose material events that shareholders should know about. It must be filed within four business days of the triggering event. Reportable events include entry into or termination of material agreements, bankruptcy, completion of acquisitions, departure of directors or principal officers, and results of operations."
    source_refs:
      - "17 CFR 249.308"
      - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=8-K"
    required_entities:
      - "Form 8-K"
      - "four business days"
      - "material events"
  constraints:
    must_mention:
      - "material"
      - "four business days"
    must_not_claim:
      - "annual"
      - "quarterly"
      - "two business days"

- id: "sec-t1-010"
  tier: 1
  type: factoid
  hops: 1
  question: "What is XBRL and how is it used in EDGAR filings?"
  ground_truth:
    answer: "XBRL (eXtensible Business Reporting Language) is a data standard used to tag financial data in SEC filings so that it is machine-readable and comparable across companies. The SEC requires public companies to submit financial statements using Inline XBRL, where XBRL tags are embedded directly in the HTML document. The US GAAP taxonomy defines the standard tags used."
    source_refs:
      - "https://www.sec.gov/structureddata/osd_inline-xbrl.htm"
      - "17 CFR 232.405"
    required_entities:
      - "XBRL"
      - "Inline XBRL"
      - "US GAAP taxonomy"
  constraints:
    must_mention:
      - "XBRL"
      - "machine-readable"
    must_not_claim:
      - "optional"
      - "PDF attachment"
      - "separate submission"

- id: "sec-t1-011"
  tier: 1
  type: factoid
  hops: 1
  question: "What is Regulation D and what exemption does it provide?"
  ground_truth:
    answer: "Regulation D provides a safe harbor exemption from SEC registration for private placements of securities. Rule 506(b) allows sales to up to 35 non-accredited but sophisticated investors and unlimited accredited investors without general solicitation. Rule 506(c) allows general solicitation but restricts sales to accredited investors only. Issuers must file Form D with the SEC within 15 days after the first sale."
    source_refs:
      - "17 CFR 230.500-230.508"
      - "Securities Act of 1933 Section 4(a)(2)"
    required_entities:
      - "Regulation D"
      - "Rule 506"
      - "Form D"
      - "accredited investors"
  constraints:
    must_mention:
      - "accredited investors"
      - "private placement"
    must_not_claim:
      - "no filing required"
      - "public offering"
      - "unlimited non-accredited investors"

- id: "sec-t1-012"
  tier: 1
  type: factoid
  hops: 1
  question: "What is a Form 13F and who is required to file it?"
  ground_truth:
    answer: "Form 13F is a quarterly report of equity holdings filed by institutional investment managers with at least $100 million in section 13(f) securities under management. It must be filed within 45 days after the end of each calendar quarter. The form discloses the manager's long positions in exchange-traded securities, including stocks, options, and convertible bonds."
    source_refs:
      - "Section 13(f) of the Securities Exchange Act of 1934"
      - "17 CFR 240.13f-1"
    required_entities:
      - "Form 13F"
      - "$100 million"
      - "45 days"
      - "institutional investment manager"
  constraints:
    must_mention:
      - "$100 million"
      - "45 days"
      - "quarterly"
    must_not_claim:
      - "short positions"
      - "all investment managers"
      - "30 days"
