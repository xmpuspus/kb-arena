- id: "k8s-t3-001"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare Deployment, StatefulSet, and DaemonSet for running workloads. When would you choose each?"
  ground_truth:
    answer: "Deployment: for stateless applications that can run on any node, supports rolling updates and rollback, Pods are interchangeable. StatefulSet: for stateful applications needing stable network identity (pod-0, pod-1), stable persistent storage per Pod (via volumeClaimTemplates), and ordered startup/shutdown — databases, message queues. DaemonSet: runs exactly one Pod per node (or node subset), used for node-level infrastructure like log collectors, monitoring agents, CNI plugins. Choose Deployment for web apps/APIs, StatefulSet for databases, DaemonSet for system daemons."
    source_refs:
      - "concepts/workloads/controllers/deployment.md"
      - "concepts/workloads/controllers/statefulset.md"
      - "concepts/workloads/controllers/daemonset.md"
    required_entities:
      - "Deployment"
      - "StatefulSet"
      - "DaemonSet"
  constraints:
    must_mention:
      - "stateless"
      - "StatefulSet"
      - "DaemonSet"
    must_not_claim:
      - "interchangeable"
      - "DaemonSet for web apps"

- id: "k8s-t3-002"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the differences between ClusterIP, NodePort, LoadBalancer, and ExternalName Service types?"
  ground_truth:
    answer: "ClusterIP (default): exposes on cluster-internal IP, not accessible externally. NodePort: exposes on each node's IP at a static port (30000-32767), accessible externally via NodeIP:NodePort. LoadBalancer: provisions an external cloud load balancer (in cloud environments), routes to NodePort underneath. ExternalName: maps Service to a DNS name (CNAME), no proxying, no selectors. For internal services use ClusterIP; for development/testing use NodePort; for production external traffic use LoadBalancer or Ingress."
    source_refs:
      - "concepts/services-networking/service.md"
    required_entities:
      - "ClusterIP"
      - "NodePort"
      - "LoadBalancer"
      - "ExternalName"
  constraints:
    must_mention:
      - "ClusterIP"
      - "LoadBalancer"
      - "ExternalName"
    must_not_claim:
      - "all types are equivalent"
      - "ExternalName proxies traffic"

- id: "k8s-t3-003"
  tier: 3
  type: comparative
  hops: 2
  question: "How do ConfigMaps and Secrets compare in terms of storage, encoding, and recommended use cases?"
  ground_truth:
    answer: "ConfigMaps store arbitrary non-sensitive string or binary data as key-value pairs, stored in plaintext in etcd, size limit 1 MiB. Secrets store sensitive data (passwords, tokens, certificates), stored base64-encoded in etcd (NOT encrypted by default — encryption at rest requires explicit KMS configuration). Both can be consumed as env vars or volume mounts. Secrets have additional RBAC protections and are not shown in kubectl describe by default. Use ConfigMaps for config; Secrets for credentials."
    source_refs:
      - "concepts/configuration/configmap.md"
      - "concepts/configuration/secret.md"
    required_entities:
      - "ConfigMap"
      - "Secret"
  constraints:
    must_mention:
      - "base64"
      - "etcd"
      - "sensitive"
    must_not_claim:
      - "Secrets are automatically encrypted"
      - "ConfigMaps for passwords"

- id: "k8s-t3-004"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare liveness, readiness, and startup probes in Kubernetes. When does each fire and what action does each trigger?"
  ground_truth:
    answer: "Liveness probe: runs continuously after startup, failure triggers container restart via kubelet. Readiness probe: runs continuously, failure removes Pod from Service endpoints (stops traffic), no restart. Startup probe: runs only at container start, disables liveness/readiness until it passes (prevents premature restarts of slow-starting apps), failure triggers container restart. Use startup probe for slow initializers, liveness for deadlock detection, readiness to gate traffic."
    source_refs:
      - "tasks/configure-pod-container/configure-liveness-readiness-startup-probes.md"
    required_entities:
      - "liveness probe"
      - "readiness probe"
      - "startup probe"
  constraints:
    must_mention:
      - "restart"
      - "readiness"
      - "startup"
    must_not_claim:
      - "all probes restart the container"
      - "readiness probe causes restart"

- id: "k8s-t3-005"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the tradeoffs between using emptyDir, hostPath, and PersistentVolume for Pod storage?"
  ground_truth:
    answer: "emptyDir: ephemeral, exists only as long as the Pod, shared between containers in a Pod, no persistence across Pod restarts, fast (memory-backed possible with medium: Memory). hostPath: mounts a directory from the node filesystem, persists across Pod restarts on the same node but not portable if Pod moves, security risk (container can write to node fs). PersistentVolume: durable, portable storage (network-backed), survives Pod rescheduling across nodes, requires StorageClass and provisioner. Use emptyDir for cache/scratch, PV for data."
    source_refs:
      - "concepts/storage/volumes.md"
      - "concepts/storage/persistent-volumes.md"
    required_entities:
      - "emptyDir"
      - "hostPath"
      - "PersistentVolume"
  constraints:
    must_mention:
      - "emptyDir"
      - "hostPath"
      - "PersistentVolume"
    must_not_claim:
      - "emptyDir persists across Pod restarts"
      - "hostPath is portable"

- id: "k8s-t3-006"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare RBAC Roles vs ClusterRoles and RoleBindings vs ClusterRoleBindings in Kubernetes."
  ground_truth:
    answer: "Role and RoleBinding are namespace-scoped — a Role grants permissions within a single Namespace, and a RoleBinding binds it to subjects in that Namespace. ClusterRole and ClusterRoleBinding are cluster-scoped — a ClusterRole can grant permissions on cluster-level resources (Nodes, PersistentVolumes) or across all Namespaces. A ClusterRole can also be bound within a Namespace via a RoleBinding (cross-cutting, useful for reusable roles like view or edit). Use Roles for per-namespace least-privilege; ClusterRoles for cluster-admin or cross-namespace."
    source_refs:
      - "reference/access-authn-authz/rbac.md"
    required_entities:
      - "Role"
      - "ClusterRole"
      - "RoleBinding"
      - "ClusterRoleBinding"
  constraints:
    must_mention:
      - "ClusterRole"
      - "namespace"
      - "RoleBinding"
    must_not_claim:
      - "Role and ClusterRole are identical"
      - "RoleBinding grants cluster-wide access"

- id: "k8s-t3-007"
  tier: 3
  type: comparative
  hops: 2
  question: "When should you use a Job vs a CronJob vs a Deployment for running background processing workloads?"
  ground_truth:
    answer: "Job: run a batch task to completion exactly once (or N times), terminates when done, designed for finite workloads like data migrations or report generation. CronJob: runs a Job on a schedule (cron expression), for recurring tasks like nightly backups. Deployment: for long-running processes that should never terminate (workers, queues), maintains desired replica count, restarts on failure. Use Job for one-shot tasks, CronJob for scheduled tasks, Deployment for persistent background workers."
    source_refs:
      - "concepts/workloads/controllers/job.md"
      - "concepts/workloads/controllers/cron-jobs.md"
      - "concepts/workloads/controllers/deployment.md"
    required_entities:
      - "Job"
      - "CronJob"
      - "Deployment"
  constraints:
    must_mention:
      - "Job"
      - "CronJob"
      - "schedule"
    must_not_claim:
      - "CronJob and Job are the same"
      - "Deployment for batch"

- id: "k8s-t3-008"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare Kubernetes node taints and pod tolerations with node affinity for controlling Pod placement."
  ground_truth:
    answer: "Taints and tolerations: taints mark nodes to repel Pods; only Pods with matching tolerations can be scheduled on tainted nodes. Used for dedicated nodes (GPU, SSD), node maintenance, or control plane isolation. Node affinity: attracts Pods to specific nodes based on node labels — required (hard) or preferred (soft). The difference: taints are a node-side rejection mechanism (default-deny a node), affinity is a Pod-side attraction mechanism (opt-in to a node). They complement each other: use taints for exclusive nodes, affinity for co-location preferences."
    source_refs:
      - "concepts/scheduling-eviction/taint-and-toleration.md"
      - "concepts/scheduling-eviction/assign-pod-node.md"
    required_entities:
      - "taint"
      - "toleration"
      - "nodeAffinity"
  constraints:
    must_mention:
      - "taint"
      - "toleration"
      - "affinity"
    must_not_claim:
      - "same mechanism"
      - "taints attract Pods"

- id: "k8s-t3-009"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare iptables and IPVS modes for kube-proxy. What are the performance tradeoffs?"
  ground_truth:
    answer: "iptables mode (default): kube-proxy programs iptables rules for each Service and endpoint. Latency is O(n) for rule matching as the number of Services grows — degrades at 1000+ Services. IPVS mode: uses Linux kernel's IP Virtual Server, which uses hash tables for O(1) Service lookup regardless of cluster size. IPVS also supports multiple load balancing algorithms (round-robin, least connections, etc.). IPVS requires the ip_vs kernel modules and ipset. For clusters with 1000+ Services, IPVS is strongly recommended."
    source_refs:
      - "reference/networking/virtual-ips.md"
    required_entities:
      - "kube-proxy"
      - "iptables"
      - "IPVS"
  constraints:
    must_mention:
      - "iptables"
      - "IPVS"
      - "performance"
    must_not_claim:
      - "iptables is faster"
      - "IPVS is the default"

- id: "k8s-t3-010"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the differences between Kubernetes Secrets of type Opaque, kubernetes.io/tls, and kubernetes.io/service-account-token?"
  ground_truth:
    answer: "Opaque (default): arbitrary user-defined data, no validation. kubernetes.io/tls: stores TLS certificate and private key — requires tls.crt and tls.key fields, used by Ingress controllers for TLS termination. kubernetes.io/service-account-token: automatically created for ServiceAccounts, contains JWT token, CA certificate, and namespace — mounted into Pods for API authentication. kubernetes.io/dockerconfigjson: stores Docker registry credentials. The type determines validation and how the Secret is used by Kubernetes components."
    source_refs:
      - "concepts/configuration/secret.md"
    required_entities:
      - "Opaque"
      - "kubernetes.io/tls"
      - "kubernetes.io/service-account-token"
  constraints:
    must_mention:
      - "Opaque"
      - "tls"
      - "service-account-token"
    must_not_claim:
      - "all types are the same"
      - "Opaque is encrypted"

- id: "k8s-t3-011"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare Kubernetes namespaces and virtual clusters (vcluster) for multi-tenancy. What are the isolation boundaries?"
  ground_truth:
    answer: "Namespaces provide logical isolation: separate resource names, RBAC, ResourceQuotas, and NetworkPolicies per tenant, but share the same Kubernetes control plane, etcd, and node kernel. A misconfigured ClusterRole or escaping container compromises all tenants. Virtual clusters (vcluster) run a complete Kubernetes API server and etcd per tenant as workloads in the host cluster, providing stronger API isolation without requiring separate nodes. vcluster syncs resources to the host cluster for actual scheduling. For strict multi-tenancy requiring API isolation, vcluster or separate clusters are preferred."
    source_refs:
      - "concepts/overview/working-with-objects/namespaces.md"
    required_entities:
      - "Namespace"
      - "multi-tenancy"
  constraints:
    must_mention:
      - "Namespace"
      - "isolation"
      - "control plane"
    must_not_claim:
      - "namespaces provide full isolation"
      - "namespaces are secure by default"

- id: "k8s-t3-012"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare Kubernetes rolling update, blue-green, and canary deployment strategies."
  ground_truth:
    answer: "Rolling update (native Deployment strategy): gradually replaces old Pods with new ones, maxUnavailable and maxSurge control pace, no extra infrastructure needed, rollback via kubectl rollout undo. Blue-green: two identical environments, switch traffic all at once via Service selector update, instant rollback, requires double the resources during transition. Canary: route a small fraction of traffic to the new version first, validate, then gradually increase — usually implemented via Ingress weights or service mesh. Blue-green and canary are not native Deployment strategies and require additional tooling."
    source_refs:
      - "concepts/workloads/controllers/deployment.md"
    required_entities:
      - "RollingUpdate"
      - "Deployment"
  constraints:
    must_mention:
      - "rolling"
      - "blue-green"
      - "canary"
    must_not_claim:
      - "blue-green is native to Kubernetes"
      - "canary is a Deployment strategy type"

- id: "k8s-t3-013"
  tier: 3
  type: comparative
  hops: 2
  question: "What are the differences between Horizontal Pod Autoscaler (HPA) and Vertical Pod Autoscaler (VPA)?"
  ground_truth:
    answer: "HPA scales the number of Pod replicas horizontally (adds/removes Pods) based on metrics like CPU, memory, or custom metrics. VPA adjusts the resource requests/limits of individual containers vertically (more or less CPU/memory per container) and can require Pod restart to apply changes. HPA and VPA should not both target CPU on the same Deployment simultaneously — HPA reacts to load by adding replicas, but VPA changing resource requests can confuse HPA. VPA is better for stateful apps that cannot scale horizontally."
    source_refs:
      - "tasks/run-application/horizontal-pod-autoscale.md"
    required_entities:
      - "HorizontalPodAutoscaler"
      - "VerticalPodAutoscaler"
  constraints:
    must_mention:
      - "HPA"
      - "VPA"
      - "replicas"
    must_not_claim:
      - "HPA and VPA are the same"
      - "use both simultaneously for CPU"

- id: "k8s-t3-014"
  tier: 3
  type: comparative
  hops: 2
  question: "Compare CSI (Container Storage Interface) volumes with in-tree volume plugins in Kubernetes."
  ground_truth:
    answer: "In-tree volume plugins (e.g., awsElasticBlockStore, gcePersistentDisk, azureDisk) were built directly into the Kubernetes codebase, meaning storage vendor code ran inside kube-controller-manager and kube-scheduler. CSI (Container Storage Interface) moves storage driver code out-of-tree as separate deployments. In-tree plugins are being migrated to CSI drivers via the CSIMigration feature gate. CSI drivers are more stable (bugs fixed without Kubernetes release), support more operations (snapshots, cloning), and can be installed independently. All new storage should use CSI."
    source_refs:
      - "concepts/storage/volumes.md"
      - "concepts/storage/storage-classes.md"
    required_entities:
      - "CSI"
      - "StorageClass"
  constraints:
    must_mention:
      - "CSI"
      - "in-tree"
      - "migration"
    must_not_claim:
      - "in-tree plugins are recommended"
      - "CSI requires cloud provider"

- id: "k8s-t3-015"
  tier: 3
  type: comparative
  hops: 2
  question: "When should you use a Kubernetes Operator versus a Helm chart for deploying applications?"
  ground_truth:
    answer: "Helm chart: packages Kubernetes YAML as templates with values, handles initial install/upgrade/rollback lifecycle, stateless — does not actively manage runtime state. Operator: a custom controller that encodes operational knowledge as code, manages the full lifecycle including complex day-2 operations (backup, scaling, failover, configuration tuning) by watching CustomResourceDefinitions. Use Helm for stateless apps or apps with predictable lifecycles. Use an Operator for stateful systems (databases, message brokers) where day-2 operations require intelligent automation beyond simple manifest application."
    source_refs:
      - "concepts/extend-kubernetes/operator.md"
    required_entities:
      - "Operator"
      - "CustomResourceDefinition"
  constraints:
    must_mention:
      - "Operator"
      - "Helm"
      - "lifecycle"
    must_not_claim:
      - "Operators and Helm are the same"
      - "Helm handles day-2 operations"
