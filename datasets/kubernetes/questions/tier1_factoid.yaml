- id: "k8s-t1-001"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the default restart policy for a Pod in Kubernetes?"
  ground_truth:
    answer: "The default restart policy for a Pod is Always. With Always, the kubelet restarts containers whenever they exit, regardless of exit code. The other options are OnFailure (restart only on non-zero exit) and Never (never restart). The restart policy applies to all containers in the Pod."
    source_refs:
      - "concepts/workloads/pods/pod-lifecycle.md"
    required_entities:
      - "Pod"
      - "restartPolicy"
  constraints:
    must_mention:
      - "Always"
      - "restart"
    must_not_claim:
      - "Never"
      - "OnFailure is the default"

- id: "k8s-t1-002"
  tier: 1
  type: factoid
  hops: 1
  question: "What port does the Kubernetes API server listen on by default?"
  ground_truth:
    answer: "The Kubernetes API server listens on port 6443 by default for secure (HTTPS) traffic. The insecure port (8080) was removed in Kubernetes 1.20. kubectl and other clients connect to 6443. The API server uses TLS client certificates or bearer tokens for authentication."
    source_refs:
      - "reference/command-line-tools-reference/kube-apiserver.md"
    required_entities:
      - "kube-apiserver"
      - "6443"
  constraints:
    must_mention:
      - "6443"
      - "HTTPS"
    must_not_claim:
      - "8080"
      - "8443"
      - "443"

- id: "k8s-t1-003"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the maximum number of pods per node recommended by Kubernetes?"
  ground_truth:
    answer: "Kubernetes recommends a maximum of 110 pods per node. This is the default limit enforced by the kubelet (--max-pods=110). The limit exists due to networking, resource, and performance constraints. Cloud providers may set lower limits: for example, AWS EKS limits are based on instance type and ENI capacity."
    source_refs:
      - "setup/best-practices/cluster-large.md"
    required_entities:
      - "kubelet"
      - "max-pods"
  constraints:
    must_mention:
      - "110"
      - "node"
    must_not_claim:
      - "100"
      - "unlimited"
      - "50"

- id: "k8s-t1-004"
  tier: 1
  type: factoid
  hops: 1
  question: "What does a Kubernetes Namespace provide?"
  ground_truth:
    answer: "A Kubernetes Namespace provides a mechanism for isolating groups of resources within a single cluster. Names of resources must be unique within a Namespace but not across Namespaces. Namespaces enable resource quotas, RBAC policies, and network policies scoped to a team or project. They do not provide strong isolation — use separate clusters for hard multi-tenancy."
    source_refs:
      - "concepts/overview/working-with-objects/namespaces.md"
    required_entities:
      - "Namespace"
    required_entities:
      - "Namespace"
      - "ResourceQuota"
  constraints:
    must_mention:
      - "isolation"
      - "resource"
    must_not_claim:
      - "strong security boundary"
      - "network isolation by default"

- id: "k8s-t1-005"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the role of the kube-scheduler component?"
  ground_truth:
    answer: "The kube-scheduler watches for newly created Pods that have no assigned node and selects a node for them to run on. Scheduling decisions consider resource requirements, hardware/software/policy constraints, affinity and anti-affinity rules, data locality, and inter-workload interference. Once a node is selected, kube-scheduler updates the Pod's spec with the node assignment."
    source_refs:
      - "concepts/scheduling-eviction/kube-scheduler.md"
    required_entities:
      - "kube-scheduler"
      - "Pod"
  constraints:
    must_mention:
      - "node"
      - "Pod"
    must_not_claim:
      - "runs containers"
      - "creates nodes"

- id: "k8s-t1-006"
  tier: 1
  type: factoid
  hops: 1
  question: "What is a Kubernetes ConfigMap used for?"
  ground_truth:
    answer: "A ConfigMap is an API object used to store non-confidential configuration data as key-value pairs. Pods can consume ConfigMaps as environment variables, command-line arguments, or as configuration files in a volume. ConfigMaps are not encrypted at rest by default — use Secrets for sensitive data. ConfigMap data is limited to 1 MiB."
    source_refs:
      - "concepts/configuration/configmap.md"
    required_entities:
      - "ConfigMap"
  constraints:
    must_mention:
      - "configuration"
      - "key-value"
    must_not_claim:
      - "encrypted"
      - "Secret"

- id: "k8s-t1-007"
  tier: 1
  type: factoid
  hops: 1
  question: "What does the kubectl apply command do differently from kubectl create?"
  ground_truth:
    answer: "kubectl apply uses server-side or client-side apply to create or update resources declaratively. It stores the applied configuration as an annotation and computes a three-way diff on subsequent applies. kubectl create is an imperative command that creates a resource but fails if the resource already exists. For GitOps and repeated deployments, kubectl apply is preferred."
    source_refs:
      - "reference/kubectl/generated/kubectl_apply.md"
    required_entities:
      - "kubectl apply"
      - "kubectl create"
  constraints:
    must_mention:
      - "apply"
      - "create"
      - "declarative"
    must_not_claim:
      - "identical"
      - "apply fails if exists"

- id: "k8s-t1-008"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the purpose of a Kubernetes liveness probe?"
  ground_truth:
    answer: "A liveness probe tells the kubelet whether to restart a container. If a liveness probe fails, the kubelet kills the container and it is subject to the Pod's restart policy. Liveness probes detect deadlocks and other states where the application is running but not functioning. They can be HTTP GET, TCP socket, exec command, or gRPC probes."
    source_refs:
      - "tasks/configure-pod-container/configure-liveness-readiness-startup-probes.md"
    required_entities:
      - "liveness probe"
      - "kubelet"
  constraints:
    must_mention:
      - "restart"
      - "kubelet"
    must_not_claim:
      - "readiness"
      - "removes from service"

- id: "k8s-t1-009"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the difference between a Kubernetes Service of type ClusterIP and one of type NodePort?"
  ground_truth:
    answer: "ClusterIP exposes the Service on a cluster-internal IP address, accessible only from within the cluster. NodePort exposes the Service on each Node's IP at a static port (range 30000-32767). NodePort also creates a ClusterIP automatically. External traffic can reach a NodePort service via <NodeIP>:<NodePort>."
    source_refs:
      - "concepts/services-networking/service.md"
    required_entities:
      - "ClusterIP"
      - "NodePort"
      - "Service"
  constraints:
    must_mention:
      - "ClusterIP"
      - "NodePort"
      - "external"
    must_not_claim:
      - "LoadBalancer"
      - "identical"

- id: "k8s-t1-010"
  tier: 1
  type: factoid
  hops: 1
  question: "What is a Kubernetes Deployment's rollout strategy set to by default?"
  ground_truth:
    answer: "A Kubernetes Deployment uses the RollingUpdate strategy by default. RollingUpdate replaces old Pods with new ones gradually, ensuring availability during updates. The default parameters are maxUnavailable=25% (maximum Pods unavailable during update) and maxSurge=25% (maximum extra Pods above the desired count). The alternative strategy is Recreate, which terminates all existing Pods before creating new ones."
    source_refs:
      - "concepts/workloads/controllers/deployment.md"
    required_entities:
      - "Deployment"
      - "RollingUpdate"
  constraints:
    must_mention:
      - "RollingUpdate"
      - "maxUnavailable"
    must_not_claim:
      - "Recreate is default"
      - "BlueGreen"

- id: "k8s-t1-011"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the default grace period for Pod termination in Kubernetes?"
  ground_truth:
    answer: "The default terminationGracePeriodSeconds for a Pod is 30 seconds. When a Pod is deleted, Kubernetes sends SIGTERM to the containers and waits up to 30 seconds for them to shut down gracefully. After the grace period, SIGKILL is sent. This can be overridden per-Pod or with kubectl delete --grace-period."
    source_refs:
      - "concepts/workloads/pods/pod-lifecycle.md"
    required_entities:
      - "terminationGracePeriodSeconds"
      - "SIGTERM"
  constraints:
    must_mention:
      - "30"
      - "SIGTERM"
    must_not_claim:
      - "60 seconds"
      - "immediate"
      - "10 seconds"

- id: "k8s-t1-012"
  tier: 1
  type: factoid
  hops: 1
  question: "What does a Kubernetes readiness probe do?"
  ground_truth:
    answer: "A readiness probe tells Kubernetes whether a container is ready to accept traffic. If a readiness probe fails, the Pod's IP is removed from the endpoints of all matching Services, stopping traffic from being routed to it. Unlike a liveness probe, a failed readiness probe does not restart the container — it just removes it from load balancing. The Pod continues running."
    source_refs:
      - "tasks/configure-pod-container/configure-liveness-readiness-startup-probes.md"
    required_entities:
      - "readiness probe"
      - "Service"
      - "endpoints"
  constraints:
    must_mention:
      - "traffic"
      - "endpoints"
    must_not_claim:
      - "restarts"
      - "kills the container"

- id: "k8s-t1-013"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the etcd component used for in a Kubernetes cluster?"
  ground_truth:
    answer: "etcd is the consistent and highly-available key-value store used as Kubernetes' backing store for all cluster data. It stores the entire cluster state: Pods, Services, Deployments, ConfigMaps, Secrets, RBAC policies, and more. The kube-apiserver is the only component that reads and writes to etcd directly. Regular etcd backups are critical for disaster recovery."
    source_refs:
      - "concepts/overview/components.md"
    required_entities:
      - "etcd"
      - "kube-apiserver"
  constraints:
    must_mention:
      - "etcd"
      - "cluster state"
    must_not_claim:
      - "database for application data"
      - "accessible by kubelet"

- id: "k8s-t1-014"
  tier: 1
  type: factoid
  hops: 1
  question: "What is the purpose of a PersistentVolumeClaim (PVC) in Kubernetes?"
  ground_truth:
    answer: "A PersistentVolumeClaim (PVC) is a request for storage by a user. It is similar to a Pod requesting node resources. A PVC specifies size, access modes, and optionally a StorageClass. Kubernetes binds the PVC to a matching PersistentVolume (PV). Pods then reference the PVC to mount the storage, decoupling the storage provisioning from the Pod definition."
    source_refs:
      - "concepts/storage/persistent-volumes.md"
    required_entities:
      - "PersistentVolumeClaim"
      - "PersistentVolume"
  constraints:
    must_mention:
      - "PersistentVolume"
      - "storage"
    must_not_claim:
      - "creates storage"
      - "same as PV"

- id: "k8s-t1-015"
  tier: 1
  type: factoid
  hops: 1
  question: "What is a Kubernetes Secret and how does it differ from a ConfigMap?"
  ground_truth:
    answer: "A Kubernetes Secret is an object for storing small amounts of sensitive data such as passwords, tokens, and keys. Like ConfigMaps, Secrets can be exposed to Pods as environment variables or mounted as files. The key difference is that Secret values are base64-encoded (not encrypted by default) and can be encrypted at rest with a KMS provider. Secrets have RBAC controls that ConfigMaps typically lack in practice."
    source_refs:
      - "concepts/configuration/secret.md"
    required_entities:
      - "Secret"
      - "ConfigMap"
  constraints:
    must_mention:
      - "Secret"
      - "base64"
    must_not_claim:
      - "fully encrypted by default"
      - "same as ConfigMap"
