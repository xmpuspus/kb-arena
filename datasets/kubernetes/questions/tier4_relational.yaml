- id: "k8s-t4-001"
  tier: 4
  type: relational
  hops: 3
  question: "If I delete a Namespace, what happens to all resources within it and in what order?"
  ground_truth:
    answer: "When a Namespace is deleted, Kubernetes sets it to Terminating state and triggers garbage collection. Kubernetes uses ownerReferences to cascade-delete owned resources: first the Namespace enters Terminating, then the namespace controller deletes all resources within it (Pods, Services, Deployments, ConfigMaps, Secrets, PVCs, etc.) in dependency order. Deployments are deleted, which deletes ReplicaSets, which delete Pods. PVCs are deleted but PersistentVolumes (cluster-scoped) are only deleted if reclaimPolicy is Delete. Finalizers on any resource block Namespace deletion until removed."
    source_refs:
      - "concepts/overview/working-with-objects/namespaces.md"
      - "concepts/workloads/controllers/garbage-collection.md"
    required_entities:
      - "Namespace"
      - "ownerReferences"
      - "finalizer"
  constraints:
    must_mention:
      - "Terminating"
      - "finalizer"
      - "ownerReferences"
    must_not_claim:
      - "immediately deleted"
      - "PersistentVolumes are deleted"

- id: "k8s-t4-002"
  tier: 4
  type: relational
  hops: 3
  question: "What chain of controllers is involved when a Deployment scales up from 1 to 3 replicas?"
  ground_truth:
    answer: "Scaling flow: (1) kubectl scale or HPA updates Deployment.spec.replicas to 3. (2) The Deployment controller reconciles and updates the owned ReplicaSet's spec.replicas to 3. (3) The ReplicaSet controller sees it has 2 Pods missing and creates 2 new Pod objects. (4) kube-scheduler assigns each pending Pod to a node. (5) kubelet on the assigned nodes pulls images and starts containers. (6) Pod status transitions to Running; ReplicaSet and Deployment status update. (7) If readiness probes pass, Pods are added to Service Endpoints."
    source_refs:
      - "concepts/workloads/controllers/deployment.md"
      - "concepts/workloads/controllers/replicaset.md"
    required_entities:
      - "Deployment"
      - "ReplicaSet"
      - "kube-scheduler"
      - "kubelet"
  constraints:
    must_mention:
      - "ReplicaSet"
      - "kube-scheduler"
      - "kubelet"
    must_not_claim:
      - "Deployment creates containers directly"
      - "kube-apiserver starts containers"

- id: "k8s-t4-003"
  tier: 4
  type: relational
  hops: 4
  question: "What happens to traffic routing when a Pod fails its readiness probe, step by step?"
  ground_truth:
    answer: "Step-by-step: (1) kubelet runs the readiness probe and records a failure. (2) kubelet updates Pod.status.conditions with Ready=False. (3) The endpoints controller (part of kube-controller-manager) watches Pod status and removes the Pod's IP from the Endpoints object for all Services selecting that Pod. (4) kube-proxy on each node watches Endpoints and removes the Pod IP from its iptables/IPVS rules. (5) New connections no longer route to the failing Pod. The Pod continues running — no restart occurs. When the probe passes again, the IP is re-added."
    source_refs:
      - "concepts/services-networking/service.md"
      - "tasks/configure-pod-container/configure-liveness-readiness-startup-probes.md"
    required_entities:
      - "readiness probe"
      - "Endpoints"
      - "kube-proxy"
      - "kubelet"
  constraints:
    must_mention:
      - "Endpoints"
      - "kube-proxy"
      - "Ready"
    must_not_claim:
      - "Pod is restarted"
      - "Service is deleted"

- id: "k8s-t4-004"
  tier: 4
  type: relational
  hops: 3
  question: "What is the sequence of events when a node becomes NotReady and Kubernetes evicts its Pods?"
  ground_truth:
    answer: "Sequence: (1) Node stops sending heartbeats to kube-controller-manager. (2) After node-monitor-grace-period (default 40s), node status becomes Unknown; after node-monitor-period, it becomes NotReady. (3) After pod-eviction-timeout (default 5 minutes in older versions, now handled by taint-based eviction in 1.18+), the node controller adds NoExecute taints. (4) Pods without matching tolerations are evicted (deleted). (5) For Pods owned by Deployments/StatefulSets, the controller creates replacement Pods on other nodes. (6) Pods with tolerationSeconds are evicted after the tolerance expires."
    source_refs:
      - "concepts/scheduling-eviction/node-pressure-eviction.md"
      - "concepts/architecture/nodes.md"
    required_entities:
      - "node-monitor-grace-period"
      - "NoExecute"
      - "eviction"
  constraints:
    must_mention:
      - "NotReady"
      - "eviction"
      - "taint"
    must_not_claim:
      - "immediately evicted"
      - "30 seconds"

- id: "k8s-t4-005"
  tier: 4
  type: relational
  hops: 3
  question: "How does a request flow from external traffic through an Ingress to a Pod, including all intermediate objects?"
  ground_truth:
    answer: "Request flow: (1) External client connects to the LoadBalancer IP (cloud LB provisioned for the Ingress controller Service of type LoadBalancer). (2) Cloud LB forwards to a node's NodePort. (3) kube-proxy routes to the Ingress controller Pod's IP. (4) The Ingress controller reads Ingress rules (hostname/path matching) and forwards to the backend Service's ClusterIP. (5) kube-proxy routes the ClusterIP to a healthy Pod IP (per Endpoints). (6) Packet arrives at the Pod's container port. TLS termination happens at step 4 if configured in the Ingress."
    source_refs:
      - "concepts/services-networking/ingress.md"
      - "concepts/services-networking/service.md"
    required_entities:
      - "Ingress"
      - "Service"
      - "kube-proxy"
      - "Endpoints"
  constraints:
    must_mention:
      - "Ingress"
      - "kube-proxy"
      - "Endpoints"
    must_not_claim:
      - "direct to Pod without Service"
      - "DNS-based routing only"

- id: "k8s-t4-006"
  tier: 4
  type: relational
  hops: 3
  question: "What happens when a PersistentVolumeClaim is deleted that is still mounted by a running Pod?"
  ground_truth:
    answer: "If a PVC is deleted while still mounted by a running Pod, Kubernetes enters a terminating state for the PVC but does not actually remove it — the PVC has a finalizer (kubernetes.io/pvc-protection) that prevents deletion while in use. The PVC remains bound and the Pod continues running with the volume. Only after the Pod is deleted and the PVC is no longer mounted does the PVC finalizer get removed and the PVC actually deleted. The PV's reclaim behavior then applies."
    source_refs:
      - "concepts/storage/persistent-volumes.md"
    required_entities:
      - "PersistentVolumeClaim"
      - "finalizer"
      - "pvc-protection"
  constraints:
    must_mention:
      - "finalizer"
      - "Terminating"
    must_not_claim:
      - "Pod is evicted"
      - "immediately deleted"

- id: "k8s-t4-007"
  tier: 4
  type: relational
  hops: 4
  question: "Trace what happens internally when you run kubectl apply -f deployment.yaml on a new Deployment."
  ground_truth:
    answer: "kubectl apply flow: (1) kubectl reads deployment.yaml and sends a PUT/PATCH to kube-apiserver at /apis/apps/v1/namespaces/{ns}/deployments. (2) kube-apiserver authenticates (client cert/token), authorizes (RBAC check), validates (against OpenAPI schema and admission webhooks). (3) The Deployment object is persisted to etcd. (4) The Deployment controller (kube-controller-manager) watches etcd via watch API and creates a ReplicaSet. (5) ReplicaSet controller creates Pod objects. (6) kube-scheduler watches for unscheduled Pods and assigns nodes. (7) kubelet on each node watches for Pods assigned to it, calls container runtime (CRI), pulls images, starts containers."
    source_refs:
      - "concepts/overview/kubernetes-api.md"
      - "reference/access-authn-authz/admission-controllers.md"
    required_entities:
      - "kube-apiserver"
      - "etcd"
      - "kube-controller-manager"
      - "kube-scheduler"
      - "kubelet"
  constraints:
    must_mention:
      - "kube-apiserver"
      - "etcd"
      - "admission"
    must_not_claim:
      - "kubectl talks directly to kubelet"
      - "etcd schedules Pods"

- id: "k8s-t4-008"
  tier: 4
  type: relational
  hops: 3
  question: "What happens when a StatefulSet is updated with a new image and how does the rolling update differ from a Deployment?"
  ground_truth:
    answer: "StatefulSet rolling update proceeds in reverse ordinal order (highest-numbered Pod first): pod-2 is deleted, recreated with the new image and must become Running+Ready before pod-1 is updated. This ensures the primary/leader (pod-0) is updated last in databases with leader election. partition parameter allows canary updates: only Pods with ordinal >= partition are updated. Deployments update in any order with maxSurge/maxUnavailable; StatefulSets guarantee ordered, one-at-a-time updates. StatefulSets also retain PVCs between updates (Pods are recreated, not just replaced)."
    source_refs:
      - "concepts/workloads/controllers/statefulset.md"
    required_entities:
      - "StatefulSet"
      - "partition"
      - "ordinal"
  constraints:
    must_mention:
      - "ordinal"
      - "reverse"
      - "partition"
    must_not_claim:
      - "same as Deployment rolling update"
      - "all Pods updated simultaneously"

- id: "k8s-t4-009"
  tier: 4
  type: relational
  hops: 3
  question: "What is the relationship between a CronJob, the Jobs it creates, and how history is managed?"
  ground_truth:
    answer: "A CronJob creates a new Job object on each scheduled run. The Job creates Pods. CronJob manages history via successfulJobsHistoryLimit (default 3) and failedJobsHistoryLimit (default 1). Old Jobs and their Pods are pruned automatically. If a CronJob schedule fires while a previous Job is still running, concurrencyPolicy controls behavior: Allow (run in parallel), Forbid (skip new run), Replace (delete running Job, start new one). startingDeadlineSeconds limits how late a missed schedule can start."
    source_refs:
      - "concepts/workloads/controllers/cron-jobs.md"
    required_entities:
      - "CronJob"
      - "Job"
      - "concurrencyPolicy"
      - "successfulJobsHistoryLimit"
  constraints:
    must_mention:
      - "concurrencyPolicy"
      - "history"
      - "Job"
    must_not_claim:
      - "CronJob runs Pods directly"
      - "unlimited history retained"

- id: "k8s-t4-010"
  tier: 4
  type: relational
  hops: 3
  question: "How does Kubernetes handle resource request overcommit and what happens when a node runs out of memory?"
  ground_truth:
    answer: "Kubernetes schedules Pods based on resource requests (not limits). Nodes can be overcommitted — total limits exceed total resources. When a node runs out of memory, the Linux OOM killer terminates processes. Kubernetes classifies Pods into QoS classes: Guaranteed (requests==limits), Burstable (requests < limits), BestEffort (no requests). OOM killer priority: BestEffort killed first, then Burstable with high usage, Guaranteed last. kubelet also has eviction thresholds: when memory pressure is detected, it evicts BestEffort pods first before OOM occurs."
    source_refs:
      - "concepts/configuration/manage-resources-containers.md"
      - "concepts/scheduling-eviction/node-pressure-eviction.md"
    required_entities:
      - "QoS"
      - "Guaranteed"
      - "BestEffort"
      - "OOM"
  constraints:
    must_mention:
      - "OOM"
      - "BestEffort"
      - "Guaranteed"
    must_not_claim:
      - "Kubernetes prevents OOM"
      - "limits prevent eviction"

- id: "k8s-t4-011"
  tier: 4
  type: relational
  hops: 4
  question: "What happens end-to-end when a custom admission webhook rejects a Pod creation request?"
  ground_truth:
    answer: "Admission webhook flow: (1) kubectl apply sends Pod create request to kube-apiserver. (2) kube-apiserver runs built-in admission controllers (e.g., ResourceQuota, LimitRanger). (3) kube-apiserver calls configured ValidatingAdmissionWebhook or MutatingAdmissionWebhook via HTTPS to the webhook service. (4) The webhook service inspects the Pod spec and returns a response. (5) If the webhook returns allowed: false with a message, kube-apiserver returns HTTP 403 to kubectl with the webhook's message. (6) The Pod is never written to etcd. (7) kubectl displays the rejection message. If the webhook is unreachable and failurePolicy is Fail, the request is also rejected."
    source_refs:
      - "reference/access-authn-authz/admission-controllers.md"
      - "reference/access-authn-authz/extensible-admission-controllers.md"
    required_entities:
      - "ValidatingAdmissionWebhook"
      - "kube-apiserver"
      - "failurePolicy"
  constraints:
    must_mention:
      - "webhook"
      - "etcd"
      - "failurePolicy"
    must_not_claim:
      - "Pod is created then deleted"
      - "webhook has no effect on rejection"

- id: "k8s-t4-012"
  tier: 4
  type: relational
  hops: 3
  question: "How does the Kubernetes garbage collector determine which objects to delete when an owner is removed?"
  ground_truth:
    answer: "Kubernetes uses ownerReferences on each object to track ownership. When an owner is deleted, the garbage collector checks the ownerReferences on dependent objects. Deletion propagation policy controls behavior: Foreground deletion blocks owner deletion until all dependents are deleted first (dependents deleted then owner). Background deletion (default) deletes the owner immediately; garbage collector cleans up dependents asynchronously. Orphan policy removes ownerReferences but leaves dependents running. Finalizers on objects block deletion until the finalizer is removed."
    source_refs:
      - "concepts/workloads/controllers/garbage-collection.md"
    required_entities:
      - "ownerReferences"
      - "Foreground"
      - "Background"
      - "finalizer"
  constraints:
    must_mention:
      - "ownerReferences"
      - "Foreground"
      - "finalizer"
    must_not_claim:
      - "garbage collection is immediate"
      - "all dependents deleted simultaneously"
