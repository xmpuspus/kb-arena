services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/kbarena1
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - ./cypher:/cypher
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - KB_ARENA_NEO4J_URI=bolt://neo4j:7687
      - KB_ARENA_NEO4J_USER=neo4j
      - KB_ARENA_NEO4J_PASSWORD=kbarena1
      - KB_ARENA_CHROMA_PATH=/data/chroma
      - KB_ARENA_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - KB_ARENA_OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - chroma_data:/data/chroma
      - ./datasets:/datasets
      - ./results:/results

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  neo4j_data:
  chroma_data:
